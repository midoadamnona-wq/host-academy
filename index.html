:root{--p:#1a56a8;--d:#0c1425;--g:#0d9668;--o:#d97706;--r:#dc2626;--bg:#f1f4f9;--c:#fff;--br:#dfe4ec;--t:#1e293b;--t2:#64748b;--t3:#94a3b8;--rd:8px;--sh:0 2px 8px rgba(0,0,0,.06)}

button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit;font-size:14px}
#TT{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--d);color:#fff;padding:10px 28px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.3)}

.hd{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center}

.hd small{font-size:10px;opacity:.5;display:block;margin-top:1px}
.hb{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.8);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600}
.nv{display:flex;background:var(--c);border-bottom:1px solid var(--br)}
.nv button{flex:1;padding:9px 2px;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--t3);font-size:10px;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.nv button.a{font-weight:700;color:var(--p);border-bottom-color:var(--p)}
.ct{padding:16px;padding-bottom:90px}
.tl{font-size:18px;font-weight:800;margin:0 0 14px;letter-spacing:-.3px}
.cd{background:var(--c);border-radius:10px;border:1px solid var(--br);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}

.cb{padding:14px}
.fg{margin-bottom:10px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--t2)}
.fi{width:100%;padding:10px 12px;border:1px solid var(--br);border-radius:var(--rd);font-size:14px;background:var(--c);color:var(--t);outline:none;transition:border .2s}
.fi:focus{border-color:var(--p)}

.btn{border:none;border-radius:var(--rd);padding:10px 20px;font-size:14px;font-weight:700;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--p);color:#fff}.bg{background:var(--g);color:#fff}.bo{background:var(--o);color:#fff}.br{background:var(--r);color:#fff}

.bf{width:100%}.bl{padding:14px;font-size:15px}
.av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.ib{background:#eef2f7;border-radius:var(--rd);padding:10px 14px;font-size:13px;color:var(--t2)}
.pb{height:6px;background:#e8ecf1;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s}
.rt{display:flex;gap:4px}
.rt button{width:32px;height:32px;border-radius:var(--rd);border:2px solid var(--br);background:transparent;font-weight:700;font-size:13px;color:var(--t3);transition:all .15s}
.lb{display:block;width:100%;padding:9px 14px;border:1px solid var(--br);border-radius:var(--rd);background:transparent;text-align:left;font-size:13px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.lb.s{border-color:var(--p);background:#eff6ff;color:var(--p);font-weight:700}
.dt{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:10px}
.dt button{width:28px;height:28px;border-radius:50%;border:2px solid var(--br);background:var(--c);font-weight:700;font-size:10px;color:var(--t2)}
.dt button.c{border-color:var(--p);background:var(--p);color:#fff}
.dt button.d{border-color:var(--g);background:#ecfdf5;color:var(--g)}
.lg{display:flex;align-items:center;gap:14px;width:100%;max-width:340px;padding:16px 20px;border:none;border-radius:14px;color:#fff;text-align:left;margin-bottom:10px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:transform .15s}
.lg:active{transform:scale(.97)}
.lg small{display:block;font-size:11px;font-weight:400;opacity:.7;margin-top:2px}
.warn{background:#fef9e7;border:1.5px solid #f5c518;border-radius:var(--rd);padding:14px;margin-bottom:10px}
.chk{display:flex;align-items:flex-start;gap:10px;padding:10px;background:#f8fafc;border:1px solid var(--br);border-radius:var(--rd);margin-bottom:6px;cursor:pointer;font-size:13px;transition:all .2s}
.chk:active{background:#ecfdf5}.chk.done{background:#ecfdf5;border-color:#a7f3d0;opacity:.6}
.hid{display:none}
.seg{display:flex;gap:3px}.seg div{flex:1;height:6px;border-radius:3px}
.mood{display:flex;gap:8px;justify-content:center}
.mood button{width:64px;height:64px;border-radius:16px;border:2px solid var(--br);background:var(--c);font-size:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s}
.mood button.s{border-color:var(--p);background:#eff6ff;transform:scale(1.05)}
.mood button span{font-size:9px;color:var(--t2);font-weight:600}
.stars{display:flex;gap:6px}.stars button{font-size:28px;background:none;border:none;opacity:.3;transition:all .15s}.stars button.on{opacity:1;transform:scale(1.1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cd{animation:fadeIn .3s ease}

function getRecs(skills,name){

var sorted=Object.entries(skills).sort(function(a,b){return Number(a[1])-Number(b[1])});

weak.forEach(function(x){var sid=x[0],v=x[1],s=SK[sid];if(!s)return;

}

function getAdviceResult(pid){
// Compare previous recommendations with current scores
var ev=S.d.evaluations.filter(function(e){return e.player_id===pid&&e.attended});
if(ev.length<2)return[];
var prev=ev[ev.length-2].skills;var curr=ev[ev.length-1].skills;
var results=[];
var prevWeak=Object.entries(prev).filter(function(x){return Number(x[1])<=2}).sort(function(a,b){return Number(a[1])-Number(b[1])}).slice(0,3);
prevWeak.forEach(function(x){
var sid=x[0],pv=Number(x[1]),cv=Number(curr[sid])||0;var s=SK[sid];if(!s||!cv)return;
var worked=cv>pv;var same=cv===pv;
results.push({skill:s.n,ar:s.a,prev:pv,curr:cv,worked:worked,same:same})});
return results
}

h+='<div style="text-align:center;margin-bottom:10px"><div style="font-size:28px;font-weight:800;color:'+(accuracy>=60?"var(--g)":"var(--o)")+'">'+accuracy+'%</div><div style="font-size:11px;color:var(--t2)">AI Accuracy: '+worked+'/'+total+' recommendations worked</div></div>';
advRes.forEach(function(r){
var icon=r.worked?"\u2705":r.same?"\u27A1\uFE0F":"\u274C";
var color=r.worked?"var(--g)":r.same?"var(--o)":"var(--r)";
h+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px"><span>'+icon+' '+r.skill+' / '+r.ar+'</span><span style="font-weight:700;color:'+color+'">'+r.prev+'\u2192'+r.curr+'</span></div>'});
h+='</div></div>'}
}

// Edit section
if(st2){
var curOvr=getOverride(p.id);var curData=parseOverride(curOvr);var curArch=getArchetype(st2.latest.skills||{});
h+='<div class="cd" style="margin-top:10px;border:1.5px solid #7c3aed"><div class="ch" style="background:#ede9fe;color:#5b21b6">\u270F\uFE0F Review & Edit / \u0645\u0631\u0627\u062C\u0639\u0629 \u0648\u062A\u0639\u062F\u064A\u0644</div><div class="cb">';
var isRev=curData&&curData.reviewed;
h+='<div style="display:flex;align-items:center;gap:10px;padding:8px;background:'+(isRev?"#ecfdf5":"#fef9e7")+';border-radius:var(--rd);margin-bottom:10px;cursor:pointer" onclick="var c=document.getElementById(\'ov_rev\');c.checked=!c.checked"><input type="checkbox" id="ov_rev" '+(isRev?"checked":"")+' style="width:18px;height:18px"><div style="font-size:12px;font-weight:600;color:'+(isRev?"#047857":"#92400e")+'">'+(isRev?"\u2705 Reviewed":"\u26A0\uFE0F Not reviewed")+'</div></div>';
h+='<div class="fg"><label class="fl">Archetype EN</label><input class="fi" id="ov_arch" value="'+(curData&&curData.archetype?curData.archetype:curArch.name)+'"></div>';
h+='<div class="fg"><label class="fl">Archetype AR</label><input class="fi" id="ov_arch_ar" value="'+(curData&&curData.archetype_ar?curData.archetype_ar:curArch.ar)+'" dir="rtl"></div>';
h+='<div class="fg"><label class="fl">Learning Style EN</label><textarea class="fi" id="ov_learn">'+(curData&&curData.learning_style?curData.learning_style:"")+'</textarea></div>';
h+='<div class="fg"><label class="fl">Learning Style AR</label><textarea class="fi" id="ov_learn_ar" dir="rtl">'+(curData&&curData.learning_style_ar?curData.learning_style_ar:"")+'</textarea></div>';
h+='<div class="fg"><label class="fl">Message EN</label><textarea class="fi" id="ov_msg">'+(curData&&curData.message?curData.message:"")+'</textarea></div>';
h+='<div class="fg"><label class="fl">Message AR</label><textarea class="fi" id="ov_msg_ar" dir="rtl">'+(curData&&curData.message_ar?curData.message_ar:"")+'</textarea></div>';
h+='<button class="btn bg bf" onclick="saveOvr(\''+p.id+'\')">Save & Approve / \u062D\u0641\u0638</button>';
if(curOvr)h+='<button class="btn bs bf" style="margin-top:6px;font-size:11px;color:var(--r)" onclick="clearOvr(\''+p.id+'\')">\u274C Clear</button>';
h+='</div></div>';
// Kid messages status (coach writes, admin views)
var kidMsgs=S.d.messages.filter(function(m){return(m.type==="kid_draft"||m.type==="kid_approved")&&String(m.text).indexOf("KIDMSG:"+p.id+":")===0});
if(kidMsgs.length){
h+='<div class="cd" style="margin-top:10px"><div class="ch">\uD83D\uDCAC Kid Messages Status</div><div class="cb">';
kidMsgs.forEach(function(m){var txt=m.text.split(":").slice(2).join(":");var approved=m.type==="kid_approved";
h+='<div style="padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px"><span style="color:'+(approved?"var(--g)":"var(--o)")+'">'+(approved?"\u2705 Approved":"\u23F3 Pending")+'</span> '+txt+'</div>'});
h+='</div></div>'}
}
return h
}

function saveOvr(pid){
var arch=document.getElementById("ov_arch").value.trim();
var archAr=document.getElementById("ov_arch_ar").value.trim();
var learn=document.getElementById("ov_learn").value.trim();
var learnAr=document.getElementById("ov_learn_ar")?document.getElementById("ov_learn_ar").value.trim():"";
var msg=document.getElementById("ov_msg").value.trim();
var msgAr=document.getElementById("ov_msg_ar")?document.getElementById("ov_msg_ar").value.trim():"";
var rev=document.getElementById("ov_rev")?document.getElementById("ov_rev").checked:false;
var data=JSON.stringify({archetype:arch||null,archetype_ar:archAr||null,learning_style:learn||null,learning_style_ar:learnAr||null,message:msg||null,message_ar:msgAr||null,reviewed:rev});
var old=getOverride(pid);
apiPost({action:"sendMessage",message:{id:old?old.id:gid(),date:new Date().toISOString(),from_name:"Admin Override",text:"OVERRIDE:"+pid+":"+data,type:"admin_override"}}).then(function(ok){if(ok){toast(rev?"Approved! \u2705":"Saved!");R()}})
}

function clearOvr(pid){
if(!confirm("Clear all overrides?"))return;
apiPost({action:"sendMessage",message:{id:gid(),date:new Date().toISOString(),from_name:"Admin",text:"OVERRIDE:"+pid+":{}",type:"admin_override"}}).then(function(ok){if(ok){toast("Cleared");R()}})
}

function sendKidMsg(pid,name,txt){
if(!txt||!txt.trim()){toast("Write a message");return}
txt=txt.trim();
apiPost({action:"sendMessage",message:{id:gid(),date:new Date().toISOString(),from_name:"Coach",text:"KIDMSG:"+pid+":"+txt,type:"kid_draft"}}).then(function(ok){if(ok){toast("Sent for parent approval! \u23F3");R()}})
}

function approveKidMsg(msgId,pid,txt){
apiPost({action:"sendMessage",message:{id:gid(),date:new Date().toISOString(),from_name:"Parent Approved",text:"KIDMSG:"+pid+":"+txt,type:"kid_approved"}}).then(function(ok){if(ok){toast("Approved! \u2705 Kid can see it now");R()}})
}

function genWA(pid){
var p=S.d.players.find(function(x){return x.id===pid});var st2=stats(pid);if(!p||!st2)return;
var t="\uD83C\uDFC0 *HOST Academy Report*\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n*"+p.name+"*\nAge: "+p.age+" | Sessions: "+st2.sessions+" | Overall: "+st2.overall.toFixed(1)+"/5\n";
RCATS.forEach(function(cat){var cd=st2.byCat[cat.id];if(!cd||cd.avg===0)return;t+="\n"+cat.ic+" *"+cat.nm+":* "+cd.avg.toFixed(1)+"/5\n";cat.sk.forEach(function(sid){var sd=st2.bySk[sid];if(!sd)return;t+="  "+SK[sid].n+": "+sd.lat+(sd.trend>0?" \u2191":sd.trend<0?" \u2193":"")+"\n"})});
t+="\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n_HOST Academy v6.0_";
document.getElementById("war").innerHTML='<div class="cd" style="margin-top:10px"><div class="ch">WhatsApp</div><div class="cb"><pre id="wat" style="white-space:pre-wrap;font-size:11px">'+t+'</pre><button class="btn bg bf" style="margin-top:6px" onclick="navigator.clipboard.writeText(document.getElementById(\'wat\').textContent).then(function(){toast(\'Copied!\')})">Copy</button></div></div>'
}
