function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fd(d){return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
function av(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function toast(m){const t=document.getElementById("T");t.textContent=m;t.style.display="block";setTimeout(()=>t.style.display="none",2500)}
function load(v){document.getElementById("L").classList.toggle("s",v)}

async function api(){
  if(!S.api)return S.d;load(true);
  try{const r=await fetch(S.api+"?action=getAll");const d=await r.json();
    if(d.success){
      d.evaluations=(d.evaluations||[]).map(e=>({...e,attended:e.attended===true||e.attended==="true"||e.attended==="TRUE",skills:typeof e.skills_json==="string"?JSON.parse(e.skills_json||"{}"):e.skills_json||{}}));
      d.players=(d.players||[]).map(p=>({...p,active:p.active!==false&&p.active!=="false"&&p.active!=="FALSE",age:Number(p.age)||0,height_cm:Number(p.height_cm)||0,weight_kg:Number(p.weight_kg)||0}));
      S.d=d;
    }
  }catch(e){console.error(e);toast("Offline mode")}
  load(false);return S.d;
}

async function post(body){
  if(!S.api){toast("Set up connection first");return false}
  load(true);
  try{const r=await fetch(S.api,{method:"POST",body:JSON.stringify(body),headers:{"Content-Type":"text/plain"}});const d=await r.json();load(false);
    if(d.success){await api();return true}else{toast("Error: "+(d.error||"Unknown"));return false}
  }catch(e){load(false);toast("Network error");return false}
}

function stats(pid){
  const ev=S.d.evaluations.filter(e=>e.player_id===pid&&e.attended);
  if(!ev.length)return null;
  const lat=ev[ev.length-1];
  const byCat={};
  RCATS.forEach(cat=>{
    const vals=ev.map(e=>{const v=cat.skills.map(s=>Number(e.skills?.[s])||0).filter(x=>x>0);return v.length?av(v):0}).filter(x=>x>0);
    const lv=cat.skills.map(s=>Number(lat.skills?.[s])||0).filter(x=>x>0);
    byCat[cat.id]={avg:av(vals),lat:av(lv),trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0};
  });
  const bySk={};
  RCATS.forEach(cat=>cat.skills.forEach(sid=>{
    const vals=ev.map(e=>Number(e.skills?.[sid])||0).filter(x=>x>0);
    if(vals.length)bySk[sid]={avg:av(vals),lat:vals[vals.length-1],trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0};
  }));
  const overall=av(Object.values(byCat).map(c=>c.avg).filter(x=>x>0));
  const allEv=S.d.evaluations.filter(e=>e.player_id===pid);
  const att=allEv.length?(allEv.filter(e=>e.attended).length/allEv.length*100):0;
  return{sessions:ev.length,byCat,bySk,overall,att};
}

function makeRadar(d1,d2){
  const sz=220,cx=sz/2,cy=sz/2,r=sz/2-32,sk=["ball_handling","speed_agility","court_awareness","effort","teamwork"],
    lb=["Ball Handle","Speed","Court IQ","Effort","Teamwork"],n=sk.length;
  let svg='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+" "+sz+'" xmlns="http://www.w3.org/2000/svg">';
  for(let lv=1;lv<=5;lv++){let pts=[];for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;pts.push((cx+r*lv/5*Math.cos(a))+","+(cy+r*lv/5*Math.sin(a)))}svg+='<polygon points="'+pts.join(" ")+'" fill="none" stroke="#e2e8f0" stroke-width="1"/>';}
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="#e2e8f0"/>';}
  let p1=[],p2=[];
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;p1.push((cx+r*(d1[sk[i]]||0)/5*Math.cos(a))+","+(cy+r*(d1[sk[i]]||0)/5*Math.sin(a)));p2.push((cx+r*(d2[sk[i]]||0)/5*Math.cos(a))+","+(cy+r*(d2[sk[i]]||0)/5*Math.sin(a)));}
  svg+='<polygon points="'+p1.join(" ")+'" fill="rgba(148,163,184,.2)" stroke="#94a3b8" stroke-width="1.5"/>';
  svg+='<polygon points="'+p2.join(" ")+'" fill="rgba(26,86,168,.15)" stroke="#1a56a8" stroke-width="2.5"/>';
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;const v=d2[sk[i]]||0;svg+='<circle cx="'+(cx+r*v/5*Math.cos(a))+'" cy="'+(cy+r*v/5*Math.sin(a))+'" r="3" fill="#1a56a8"/>';}
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;const x=cx+(r+22)*Math.cos(a),y=cy+(r+22)*Math.sin(a);svg+='<text x="'+x+'" y="'+y+'" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">'+lb[i]+"</text>";}
  svg+='<rect x="8" y="'+(sz-18)+'" width="10" height="3" fill="#94a3b8"/><text x="22" y="'+(sz-14)+'" font-size="7" fill="#94a3b8">Prev</text>';
  svg+='<rect x="60" y="'+(sz-18)+'" width="10" height="3" fill="#1a56a8"/><text x="74" y="'+(sz-14)+'" font-size="7" fill="#1a56a8">Latest</text>';
  svg+="</svg>";return svg;
}

}

function ckPin(t){
  const pin=document.getElementById("pv").value;
  if(t==="admin"){if(pin===S.pin){S.mode="admin";api().then(R)}else toast("Wrong PIN")}
  else{
    let child=S.d.players.find(p=>p.parent_pin===pin);
    if(child){S.childId=child.id;S.mode="parent";S.pt="report";api().then(R)}

  }
}

function startSess(){
  const pl=S.d.players.filter(p=>p.active);
  if(!pl.length){toast("Add players first");return}
  const today=new Date().toISOString().slice(0,10);
  const existing=S.d.sessions.find(s=>s.date&&s.date.slice(0,10)===today);
  if(existing&&!S.editSess){S.dupSess=existing;R();return}
  const sid=S.editSess?S.editSess.id:gid();
  S.sess={id:sid,date:S.editSess?S.editSess.date:new Date().toISOString(),coach:S.coach,plan:S.plan,edited:!!S.editSess,last_edited:S.editSess?new Date().toISOString():null};
  S.ei=0;
  if(S.editSess){
    const old=S.d.evaluations.filter(e=>e.session_id===S.editSess.id);
    S.evals=pl.map(p=>{const o=old.find(e=>e.player_id===p.id);return o?{pid:p.id,pn:p.name,att:o.attended,sk:{...(o.skills||{})},nt:o.notes||""}:{pid:p.id,pn:p.name,att:true,sk:{},nt:""}});
  }else{S.evals=pl.map(p=>({pid:p.id,pn:p.name,att:true,sk:{},nt:""}))}
  S.editSess=null;S.dupSess=null;S.ct="evaluating";R();
}

        else h+='<div style="font-size:10px;color:var(--t3);margin-top:3px;font-style:italic">Tap to see criteria | اضغط لرؤية المعيار</div>';
        h+="</div>";

      h+="</div>";

  h+='<div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--br)"><button class="bs" onclick="S.ei=Math.max(0,S.ei-1);R()" '+(S.ei===0?"disabled":"")+">← Prev</button>";

function viewSummary(){
  const att=S.evals.filter(e=>e.att);

async function saveSess(){
  const session={...S.sess,notes:S.snotes,completed:true};
  const evaluations=S.evals.map(e=>({session_id:session.id,player_id:e.pid,player_name:e.pn,attended:e.att,skills:e.sk,notes:e.nt}));
  const ok=await post({action:"saveSession",session,evaluations});
  if(ok){S.sess=null;S.evals=[];S.coach="";S.snotes="";S.plan=null;S.ct="evaluate";toast(session.edited?"Session updated! ✏️":"Session saved! 🏀");R()}
}
