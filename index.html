<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1a56a8;--dark:#0f172a;--green:#059669;--gold:#d97706;--red:#dc2626;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;--text3:#94a3b8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}
button{cursor:pointer;-webkit-appearance:none;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:14px}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;white-space:nowrap}

/* Loading overlay */
#loading{position:fixed;inset:0;background:rgba(15,23,42,.7);display:none;align-items:center;justify-content:center;z-index:998}
#loading.show{display:flex}
#loading span{color:#fff;font-size:16px;font-weight:600}

/* Login */
.login{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e3a5f,#1a365d);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login h1{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px}
.login .sub{font-size:14px;color:rgba(255,255,255,.6);margin:4px 0 40px;text-align:center}
.login-btn{display:flex;align-items:center;gap:14px;width:100%;max-width:340px;padding:18px 20px;border:none;border-radius:14px;color:#fff;text-align:left;margin-bottom:12px;font-size:16px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:transform .1s}
.login-btn:active{transform:scale(.97)}
.login-btn small{display:block;font-size:12px;font-weight:400;opacity:.8;margin-top:2px}

/* PIN screen */
.pin-screen{min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-screen h2{color:#fff;font-size:20px;font-weight:700;margin:16px 0 24px}
.pin-input{width:200px;padding:12px;border:2px solid #334155;border-radius:10px;background:#1e293b;color:#fff;font-size:28px;text-align:center;letter-spacing:10px;outline:none}
.pin-input:focus{border-color:var(--blue)}
.pin-btns{display:flex;gap:12px;margin-top:20px}

/* Header */
.header{padding:16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.header h2{font-size:18px;font-weight:800}
.header small{font-size:11px;opacity:.7;display:block;margin-top:1px}
.header-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600}

/* Nav */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border)}
.nav button{flex:1;padding:10px 4px;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text2);border-bottom:2px solid transparent;font-size:10px}
.nav button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.nav button .ni{font-size:18px}

/* Content */
.content{padding:16px;padding-bottom:80px}
.title{font-size:20px;font-weight:800;margin:0 0 16px;letter-spacing:-.3px}

/* Cards */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-h{padding:10px 16px;font-weight:700;font-size:12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;color:var(--text2);background:#f8fafc}
.card-b{padding:16px}

/* Forms */
.fg{margin-bottom:10px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2)}
.fi{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;background:var(--card);color:var(--text);outline:none}
.fi:focus{border-color:var(--blue)}
textarea.fi{min-height:60px;resize:vertical}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-g{background:var(--green);color:#fff}
.btn-r{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-full{width:100%}
.btn-lg{padding:14px;font-size:16px}

/* Avatar */
.av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a56a8,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.av-lg{width:52px;height:52px;font-size:22px}

/* Player row */
.p-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.p-row:last-child{border:none}
.p-left{display:flex;align-items:center;gap:10px}
.p-name{font-weight:700;font-size:15px}
.p-sub{font-size:12px;color:var(--text2)}

/* Rating */
.rating{display:flex;gap:5px}
.rating button{width:42px;height:42px;border-radius:8px;border:2px solid var(--border);background:transparent;font-weight:700;font-size:16px;color:var(--text3);transition:all .15s}
.rating button.sel{color:#fff}
.rating.sm button{width:34px;height:34px;font-size:14px}
.r-label{font-size:11px;color:var(--text3);margin-top:3px;text-align:center;font-style:italic}

/* Progress bar */
.pbar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .5s}

/* Info box */
.info-box{background:#f0f4f8;border-radius:10px;padding:10px 14px;font-size:13px}

/* Plan button */
.plan-btn{display:block;width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;text-align:left;font-size:13px;font-weight:500;margin-bottom:6px;transition:all .15s}
.plan-btn.sel{border-color:var(--blue);background:#eff6ff;color:#1e40af;font-weight:700}

/* Quick jump dots */
.dots{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:12px}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.dot.cur{border-color:var(--blue);background:var(--blue);color:#fff}
.dot.done{border-color:var(--green);background:#ecfdf5;color:var(--green)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-weight:700;font-size:18px;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--text2);line-height:1.5}

/* Attend toggle */
.att-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8fafc;border-radius:10px;margin-bottom:16px}
.att-btn{padding:8px 20px;border:2px solid var(--border);border-radius:8px;background:transparent;font-weight:600;font-size:16px}

/* Score card */
.score-card{text-align:center;padding:24px;border-radius:16px;color:#fff;margin-bottom:16px}
.score-num{font-size:48px;font-weight:900}
.score-label{font-size:14px;opacity:.8;margin-top:4px}

/* Metric row */
.met-row{margin-bottom:14px}
.met-head{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px}

/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)}

/* Setup screen */
.setup-card{background:var(--card);border-radius:16px;padding:24px;margin:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.setup-card h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--blue)}
.setup-card code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:13px;word-break:break-all}
</style>

// ─── TOAST ───
function toast(msg){

        ...e,
        attended: e.attended === true || e.attended === 'true' || e.attended === 'TRUE',

        active: p.active !== false && p.active !== 'false' && p.active !== 'FALSE',
        age: Number(p.age)||0,
        height_cm: Number(p.height_cm)||0,
        weight_kg: Number(p.weight_kg)||0,
      }));
      state.data=d;
    }
  }catch(e){console.error('API error:',e);toast('Offline - using cached data')}
  showLoad(false);
  return state.data;
}

async function apiPost(body){
  if(!state.apiUrl){toast('Set up Google Sheet first');return false}
  showLoad(true);
  try{
    const r=await fetch(state.apiUrl,{method:'POST',body:JSON.stringify(body),headers:{'Content-Type':'text/plain'}});
    const d=await r.json();
    showLoad(false);
    if(d.success){await apiGet();return true}
    else{toast('Error: '+(d.error||'Unknown'));return false}
  }catch(e){showLoad(false);toast('Network error');return false}
}

// ─── STATS ───
function getPlayerStats(pid){
  const evals=state.data.evaluations.filter(e=>e.player_id===pid&&e.attended);
  if(!evals.length)return null;
  const latest=evals[evals.length-1];
  const byCat={};
  (typeof REPORT_CATS!=='undefined'?REPORT_CATS:SKILL_CATS).forEach(cat=>{
    const sids=cat.skills.map(s=>s.id);
    const catVals=evals.map(ev=>{
      const vals=sids.map(s=>Number(ev.skills?.[s])||0).filter(v=>v>0);
      return vals.length?avg(vals):0;
    }).filter(v=>v>0);
    const latVals=sids.map(s=>Number(latest.skills?.[s])||0).filter(v=>v>0);
    byCat[cat.id]={
      avg:avg(catVals),
      latest:avg(latVals),
      trend:catVals.length>=2?catVals[catVals.length-1]-catVals[catVals.length-2]:0
    };
  });
  const bySkill={};
  (typeof REPORT_CATS!=='undefined'?REPORT_CATS:SKILL_CATS).forEach(cat=>{
    cat.skills.forEach(sk=>{
      const vals=evals.map(ev=>Number(ev.skills?.[sk.id])||0).filter(v=>v>0);
      if(vals.length){
        bySkill[sk.id]={
          avg:avg(vals),
          latest:vals[vals.length-1],
          trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0,
          name:sk.name,
          nameAr:sk.nameAr,
          cat:cat.id,
          catName:cat.name,
          color:cat.color,
          icon:cat.icon
        };
      }
    });
  });
  const allAvgs=Object.values(byCat).map(c=>c.avg).filter(v=>v>0);
  const overall=avg(allAvgs);
  const allEvals=state.data.evaluations.filter(e=>e.player_id===pid);
  const attendRate=allEvals.length?(allEvals.filter(e=>e.attended).length/allEvals.length*100):0;
  return{sessions:evals.length,byCat,bySkill,overall,attendRate};
}

function setAttend(v){
  state.sessionEvals[state.evalIndex].attended=v;
  if(!v)state.sessionEvals[state.evalIndex].skills={};
  render();
}
function rateSkill(skillId,val){
  state.sessionEvals[state.evalIndex].skills[skillId]=val;
  render();
}
function navEval(dir){
  state.evalIndex=Math.max(0,Math.min(state.sessionEvals.length-1,state.evalIndex+dir));
  render();
}

function renderSessionSummary(){
  const attended=state.sessionEvals.filter(e=>e.attended);
  const rows=attended.map(e=>{
    const rated=Object.values(e.skills||{}).filter(v=>v>0);
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9">
      <span style="font-weight:600">${e.player_name}</span>
      <span style="font-size:13px;color:${rated.length?'var(--green)':'var(--red)'}">${rated.length?`Avg: ${avg(rated).toFixed(1)}/5 (${rated.length} skills)`:'Not rated'}</span>
    </div>`;
  }).join('');
  
  return `<div class="content">
    <h2 class="title">Session Summary</h2>
    <div class="card"><div class="card-h">Review Before Saving</div><div class="card-b">
      <div class="info-box" style="margin-bottom:12px">
        📅 ${fmtDate(state.activeSession.date)}<br>
        👤 Coach: ${state.activeSession.coach||'—'}<br>
        ✅ Attended: ${attended.length} / ${state.sessionEvals.length}<br>
        ❌ Absent: ${state.sessionEvals.length-attended.length}
      </div>
      ${rows}
      <div class="fg" style="margin-top:12px"><label class="fl">Session Notes</label>
        <textarea class="fi" id="sessNote" placeholder="Overall notes..." oninput="state.sessionNotes=this.value">${state.sessionNotes}</textarea></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-s" onclick="state.coachTab='evaluating';render()">← Edit</button>
        <button class="btn btn-g" style="flex:1" onclick="saveSession()">✓ Save Session</button>
      </div>
    </div></div>
  </div>`;
}

async function saveSession(){
  const session={...state.activeSession,notes:state.sessionNotes,completed:true};
  const evals=state.sessionEvals.map(e=>({...e,session_id:session.id}));
  const ok=await apiPost({action:'saveSession',session,evaluations:evals});
  if(ok){
    state.activeSession=null;state.sessionEvals=[];state.sessionCoach='';state.sessionNotes='';state.sessionPlan=null;
    state.editingSession=null;state.duplicateSession=null;
    state.coachTab='evaluate';
    toast(session.edited?'Session updated! ✏️🏀':'Session saved! 🏀');
    render();
  }
}

function makeRadar(d1,d2){
  const s=240,cx=s/2,cy=s/2,r=s/2-36;
  const sk=['ball_handling','speed_agility','court_awareness','effort','teamwork'];
  const lb=['Ball\nHandling','Speed &\nAgility','Court\nAwareness','Effort','Teamwork'];
  const n=sk.length;
  let svg=`<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">`;
  for(let lv=1;lv<=5;lv++){
    const lr=r*lv/5;let pts=[];
    for(let i=0;i<n;i++){const a=(2*Math.PI*i/n)-Math.PI/2;pts.push(`${cx+lr*Math.cos(a)},${cy+lr*Math.sin(a)}`);}
    svg+=`<polygon points="${pts.join(' ')}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`;
  }
  for(let i=0;i<n;i++){const a=(2*Math.PI*i/n)-Math.PI/2;svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(a)}" y2="${cy+r*Math.sin(a)}" stroke="#e2e8f0" stroke-width="1"/>`;}
  let p1=[],p2=[];
  for(let i=0;i<n;i++){const a=(2*Math.PI*i/n)-Math.PI/2;const v1=d1[sk[i]]||0;const v2=d2[sk[i]]||0;
    p1.push(`${cx+(r*v1/5)*Math.cos(a)},${cy+(r*v1/5)*Math.sin(a)}`);
    p2.push(`${cx+(r*v2/5)*Math.cos(a)},${cy+(r*v2/5)*Math.sin(a)}`);
  }
  svg+=`<polygon points="${p1.join(' ')}" fill="rgba(148,163,184,0.2)" stroke="#94a3b8" stroke-width="1.5"/>`;
  svg+=`<polygon points="${p2.join(' ')}" fill="rgba(26,86,168,0.15)" stroke="#1a56a8" stroke-width="2.5"/>`;
  for(let i=0;i<n;i++){const a=(2*Math.PI*i/n)-Math.PI/2;const v=d2[sk[i]]||0;
    svg+=`<circle cx="${cx+(r*v/5)*Math.cos(a)}" cy="${cy+(r*v/5)*Math.sin(a)}" r="3.5" fill="#1a56a8"/>`;
  }
  for(let i=0;i<n;i++){const a=(2*Math.PI*i/n)-Math.PI/2;const x=cx+(r+24)*Math.cos(a);const y=cy+(r+24)*Math.sin(a);
    lb[i].split('\n').forEach((l,j,arr)=>{svg+=`<text x="${x}" y="${y+j*11-(arr.length-1)*5}" text-anchor="middle" font-size="8" font-weight="600" fill="#475569">${l}</text>`;});
  }
  svg+=`<rect x="8" y="${s-20}" width="10" height="3" fill="#94a3b8"/><text x="22" y="${s-16}" font-size="7" fill="#94a3b8">Session 1</text>`;
  svg+=`<rect x="70" y="${s-20}" width="10" height="3" fill="#1a56a8"/><text x="84" y="${s-16}" font-size="7" fill="#1a56a8">Session 2</text>`;
  svg+='</svg>';return svg;
}

    const change=avg2-avg1;

    // HEADER CARD
    content+=`<div style="background:linear-gradient(135deg,#0f172a,#1e40af);border-radius:16px;padding:24px;color:#fff;margin-bottom:16px;text-align:center">

    // Radar chart
    content+=`<div style="text-align:center;margin:16px 0">
      <div style="font-weight:700;color:#334155;margin-bottom:8px">📊 Skills Overview / نظرة عامة</div>
      ${makeRadar(d1,d2)}
    </div>`;

    // Skill by skill analysis
    content+=`<div style="font-weight:700;font-size:16px;margin:20px 0 12px">📋 Detailed Analysis / تحليل تفصيلي</div>`;
    const skInfo={ball_handling:{en:'Ball Handling',ar:'التحكم بالكرة',icon:'🏀',color:'#2563eb'},speed_agility:{en:'Speed & Agility',ar:'السرعة والرشاقة',icon:'⚡',color:'#059669'},court_awareness:{en:'Court Awareness',ar:'الوعي بالملعب',icon:'🧠',color:'#7c3aed'},effort:{en:'Effort & Discipline',ar:'الجهد والانضباط',icon:'💪',color:'#d97706'},teamwork:{en:'Teamwork',ar:'العمل الجماعي',icon:'🤝',color:'#0891b2'}};
    
    Object.entries(skInfo).forEach(([sk,info])=>{
      const v1n=Number(d1[sk])||0;const v2n=Number(d2[sk])||0;
      const t=getSkillText(sk,v1n,v2n,child.name,child.age);
      const rc=v2n>=4?'#047857':v2n>=3?'#d97706':'#dc2626';

      <div style="font-weight:700;color:#047857;margin-bottom:6px">🌟 Strengths / نقاط القوة</div>

      <b>أقوى مهارة:</b> ${skInfo[strongest[0]]?.ar||strongest[0]}</p>

    // Parent feedback request
    content+=`<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:16px;margin:16px 0">

        <div style="background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #fed7aa"><div style="font-size:18px">😴</div><div style="font-size:10px;font-weight:600">Sleep Hours<br>ساعات النوم</div></div>
        <div style="background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #fed7aa"><div style="font-size:18px">🍽️</div><div style="font-size:10px;font-weight:600">Last Meal<br>آخر وجبة</div></div>
        <div style="background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #fed7aa"><div style="font-size:18px">😊</div><div style="font-size:10px;font-weight:600">Mood Today<br>المزاج</div></div>

  // Messages
  if(state.data.messages.length){

    </div></div>`;
  }
  
  content+=`<div class="footer">HOST Academy · House of Sports Talents<br>Empowering Future Champions – In Sport, In Life</div>`;
  
  return hdr(child.name,`Age ${child.age} · HOST Academy`,'#047857')+`<div class="content">${content}</div>`;
}

    return hdr(child.name,'Age '+child.age+' · HOST Academy','#047857')+`<div class="content">\${content}</div>`;
  }

  if(parentTab==='feedback'){
    content+=`<div style="text-align:center;margin-bottom:16px"><span style="font-size:36px">⭐</span><h3 style="margin:8px 0 4px">Monthly Feedback / رأيك الشهري</h3><p style="font-size:12px;color:var(--text2)">Help us improve! | ساعدنا نتحسن!</p></div>
    <div class="card"><div class="card-b">
      <div class="fg"><label class="fl">⭐ Training quality / جودة التدريب (1-5)</label>
        <div class="rating" id="fb_training">${[1,2,3,4,5].map(v=>'<button onclick="this.parentNode.dataset.val='+v+';this.parentNode.querySelectorAll(\'button\').forEach((b,i)=>{b.style.background=i<'+v+'?\'#f59e0b\':\'transparent\';b.style.borderColor=i<'+v+'?\'#f59e0b\':\'var(--border)\';b.style.color=i<'+v+'?\'#fff\':\'var(--text3)\'})">⭐</button>').join('')}</div></div>
      <div class="fg"><label class="fl">👨‍🏫 Coach interaction / تعامل المدرب (1-5)</label>
        <div class="rating" id="fb_coach">${[1,2,3,4,5].map(v=>'<button onclick="this.parentNode.dataset.val='+v+';this.parentNode.querySelectorAll(\'button\').forEach((b,i)=>{b.style.background=i<'+v+'?\'#f59e0b\':\'transparent\';b.style.borderColor=i<'+v+'?\'#f59e0b\':\'var(--border)\';b.style.color=i<'+v+'?\'#fff\':\'var(--text3)\'})">⭐</button>').join('')}</div></div>
      <div class="fg"><label class="fl">📱 App usefulness / فائدة التطبيق (1-5)</label>
        <div class="rating" id="fb_app">${[1,2,3,4,5].map(v=>'<button onclick="this.parentNode.dataset.val='+v+';this.parentNode.querySelectorAll(\'button\').forEach((b,i)=>{b.style.background=i<'+v+'?\'#f59e0b\':\'transparent\';b.style.borderColor=i<'+v+'?\'#f59e0b\':\'var(--border)\';b.style.color=i<'+v+'?\'#fff\':\'var(--text3)\'})">⭐</button>').join('')}</div></div>
      <div class="fg"><label class="fl">🏃 Is your child excited to go to training? / هل طفلك متحمس للتدريب؟</label>
        <select class="fi" id="fb_excited"><option value="">Select / اختار</option><option>Always / دائماً</option><option>Usually / غالباً</option><option>Sometimes / أحياناً</option><option>Rarely / نادراً</option></select></div>
      <div class="fg"><label class="fl">📢 Would you recommend HOST to a friend? / هل تنصح صديق بـ HOST؟</label>
        <select class="fi" id="fb_recommend"><option value="">Select / اختار</option><option>Definitely! / بالتأكيد!</option><option>Probably / غالباً</option><option>Not sure / مش متأكد</option><option>No / لا</option></select></div>
      <div class="fg"><label class="fl">💬 Suggestions or concerns / اقتراحات أو ملاحظات</label>
        <textarea class="fi" id="fb_text" placeholder="Your feedback matters... / رأيك مهم..."></textarea></div>
      ${(()=>{
        const thisMonth=new Date().toISOString().slice(0,7);
        const existing=state.data.messages.find(m=>(m.type==='parent_feedback'||String(m.text).startsWith('MONTHLY FEEDBACK:'))&&String(m.from_name).includes(child.name)&&m.date&&m.date.slice(0,7)===thisMonth);
        if(existing)return '<div style="background:#ede9fe;border:1px solid #c4b5fd;border-radius:10px;padding:14px;text-align:center"><span style="font-size:24px">✅</span><br><b style="color:#6d28d9">Already submitted this month! | تم الإرسال هذا الشهر</b><br><span style="font-size:12px;color:#5b21b6">'+fmtDate(existing.date)+'</span><br><button class="btn btn-s" style="margin-top:8px;font-size:12px" onclick="submitParentFeedback(\''+child.id+'\',\''+child.name+'\',\''+child.parent_name+'\')">Update / تحديث</button></div>';
        return '<button class=\"btn btn-p btn-full btn-lg\" onclick=\"submitParentFeedback(\''+child.id+'\',\''+child.name+'\',\''+child.parent_name+'\')\">✓ Submit Feedback / إرسال</button>';
      })()}
    </div></div>`;
    return hdr(child.name,'Age '+child.age+' · HOST Academy','#047857')+`<div class="content">\${content}</div>`;
  }

  // Report tab (default)
  content+=`<div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:16px;padding:16px;margin-bottom:16px;border:1px solid #a7f3d0">
    <div style="font-size:16px;font-weight:700;color:#047857;margin-bottom:4px">Welcome, ${child.parent_name||'Parent'} 👋</div>
    <div style="font-size:13px;color:#065f46">${child.name}'s progress at HOST Academy</div>
  </div>`;
  if(state.adminTab==='players')content=renderAdminPlayers();
  else if(state.adminTab==='reports')content=renderAdminReports();
  else if(state.adminTab==='messages')content=renderAdminMessages();
  else if(state.adminTab==='data')content=renderAdminData();
  
  return hdr('Admin','لوحة الإدارة','#6d28d9')+nav+`<div class="content">${content}</div>`;
}

function renderAdminPlayers(){
  const players=state.data.players;
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2 class="title" style="margin:0">Players (${players.length})</h2>
    <button class="btn btn-p" onclick="showAddPlayer()">+ Add</button>
  </div>
  <div id="addPlayerForm" class="hidden"></div>`;
  
  players.forEach(p=>{
    html+=`<div class="card" style="opacity:${p.active!==false?1:.5}"><div class="card-b">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="p-left">
          <div class="av">${p.name.charAt(0)}</div>
          <div>
            <div class="p-name">${p.name} ${p.age?`(${p.age})`:''}</div>
            <div class="p-sub">${p.parent_name||'—'} · PIN: <b>${p.parent_pin}</b>${p.height_cm?` · ${p.height_cm}cm`:''}</div>
            <div style="font-size:10px;color:var(--text3)">${p.medical_notes?'⚕️ '+p.medical_notes:''}</div>
          </div>
        </div>
      </div>
    </div></div>`;
  });
  
  if(!players.length)html+=`<div class="empty"><div class="empty-icon">👥</div><div class="empty-title">No players</div><div class="empty-text">Add your 13 players to get started.</div></div>`;
  return html;
}

function showAddPlayer(){
  const f=document.getElementById('addPlayerForm');
  f.classList.toggle('hidden');
  if(!f.classList.contains('hidden')){
    f.innerHTML=`<div class="card"><div class="card-h">Add New Player</div><div class="card-b">
      <div class="form-grid">
        <div class="fg"><label class="fl">Name / الاسم *</label><input class="fi" id="np_name" placeholder="Ahmed"></div>
        <div class="fg"><label class="fl">Age / السن</label><input class="fi" id="np_age" type="number" placeholder="8"></div>
        <div class="fg"><label class="fl">Height cm / الطول</label><input class="fi" id="np_height" type="number" placeholder="130"></div>
        <div class="fg"><label class="fl">Weight kg / الوزن</label><input class="fi" id="np_weight" type="number" placeholder="30"></div>
      </div>
      <div class="form-grid">
        <div class="fg"><label class="fl">Parent Name</label><input class="fi" id="np_parent" placeholder="Mohamed"></div>
        <div class="fg"><label class="fl">Parent Phone</label><input class="fi" id="np_phone" placeholder="01xxxxxxxxx"></div>
      </div>
      <div class="fg"><label class="fl">Medical Notes</label><input class="fi" id="np_medical" placeholder="Allergies, asthma, etc."></div>
      <div style="display:flex;gap:8px"><button class="btn btn-p" onclick="addPlayer()">Save</button><button class="btn btn-s" onclick="document.getElementById('addPlayerForm').classList.add('hidden')">Cancel</button></div>
    </div></div>`;
  }
}

async function addPlayer(){
  const name=document.getElementById('np_name').value.trim();
  if(!name){toast('Enter a name');return}
  const pin=String(Math.floor(1000+Math.random()*9000));
  const player={
    id:genId(), name,
    age:document.getElementById('np_age').value||'',
    height_cm:document.getElementById('np_height').value||'',
    weight_kg:document.getElementById('np_weight').value||'',
    parent_name:document.getElementById('np_parent').value.trim(),
    parent_phone:document.getElementById('np_phone').value.trim(),
    parent_pin:pin,
    join_date:new Date().toISOString(),
    active:true,
    medical_notes:document.getElementById('np_medical').value.trim(),
  };
  const ok=await apiPost({action:'addPlayer',player});
  if(ok){toast(`${name} added (PIN: ${pin})`);document.getElementById('addPlayerForm').classList.add('hidden');render()}
}

function renderAdminReports(){
  if(!state.selectedPlayerReport){
    const players=state.data.players.filter(p=>p.active!==false);
    return `<h2 class="title">Player Reports</h2>`+players.map(p=>{
      const st=getPlayerStats(p.id);
      return `<div class="card" onclick="state.selectedPlayerReport='${p.id}';render()" style="cursor:pointer"><div class="card-b">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="p-left"><div class="av">${p.name.charAt(0)}</div><div>
            <div class="p-name">${p.name}</div>
            <div class="p-sub">${st?`${st.sessions} sessions · ${st.overall.toFixed(1)}/5`:'No data'}</div>
          </div></div><span>→</span></div>
      </div></div>`;
    }).join('')+(state.data.evaluations.length===0?'<div class="empty"><div class="empty-icon">📈</div><div class="empty-title">No reports yet</div></div>':'');
  }
  
  const p=state.data.players.find(x=>x.id===state.selectedPlayerReport);
  const st=getPlayerStats(p?.id);
  if(!p)return '';
  
  let html=`<button class="btn btn-s" onclick="state.selectedPlayerReport=null;render()">← Back</button>
    <div style="display:flex;align-items:center;gap:12px;margin:16px 0">
      <div class="av av-lg">${p.name.charAt(0)}</div>
      <div><div style="font-size:22px;font-weight:800">${p.name}</div>
        <div style="font-size:13px;color:var(--text2)">Age ${p.age} · ${st?.sessions||0} sessions${p.height_cm?` · ${p.height_cm}cm`:''}${p.weight_kg?` · ${p.weight_kg}kg`:''}</div>
      </div>
    </div>`;
  
  if(st){
    html+=`<div class="score-card" style="background:linear-gradient(135deg,#6d28d9,#4c1d95)">
      <div class="score-num">${st.overall.toFixed(1)}</div>
      <div class="score-label">Overall / 5.0 · Attendance: ${st.attendRate.toFixed(0)}%</div>
    </div>`;
    
    (typeof REPORT_CATS!=='undefined'?REPORT_CATS:SKILL_CATS).forEach(cat=>{
      const cd=st.byCat[cat.id];
      if(!cd||cd.avg===0)return;
      const trend=cd.trend>0.1?`↑+${cd.trend.toFixed(1)}`:cd.trend<-0.1?`↓${cd.trend.toFixed(1)}`:'—';
      html+=`<div class="met-row"><div class="met-head">
        <span style="font-weight:600">${cat.icon} ${cat.name}</span>
        <span style="font-weight:700">${cd.avg.toFixed(1)} <span style="font-size:12px;color:${cd.trend>0?'var(--green)':'var(--text3)'}">${trend}</span></span>
      </div><div class="pbar"><div class="pbar-fill" style="width:${(cd.avg/5)*100}%;background:${cat.color}"></div></div></div>`;
      cat.skills.forEach(sk=>{
        const sd=st.bySkill?.[sk.id];
        if(!sd)return;
        const st2=sd.trend>0.1?`<span style="color:var(--green)">↑</span>`:sd.trend<-0.1?`<span style="color:var(--red)">↓</span>`:'';
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 4px 20px;font-size:13px;border-bottom:1px solid #f8fafc">
          <span style="color:var(--text2)">${sk.name} <span style="font-size:11px;color:var(--text3)">${sk.nameAr}</span></span>
          <span style="font-weight:700">${sd.avg.toFixed(1)} ${st2}</span>
        </div>`;
      });
    });
    
    // Generate WhatsApp report
    html+=`<button class="btn btn-p btn-full" style="margin-top:16px" onclick="genWhatsAppReport('${p.id}')">📱 Generate WhatsApp Report</button>
      <div id="waReport" class="hidden" style="margin-top:12px"><div class="card"><div class="card-h">Copy this text and send via WhatsApp</div>
        <div class="card-b"><pre id="waText" style="white-space:pre-wrap;font-size:13px;line-height:1.6"></pre>
          <button class="btn btn-g btn-full" style="margin-top:8px" onclick="copyReport()">📋 Copy to Clipboard</button>
        </div></div></div>`;
  }
  return html;
}

function genWhatsAppReport(pid){
  const p=state.data.players.find(x=>x.id===pid);
  const st=getPlayerStats(pid);
  if(!p||!st)return;
  
  let txt=`🏀 *HOST Academy Progress Report*\n━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`*Player:* ${p.name}\n`;
  txt+=`*Age:* ${p.age} | *Sessions:* ${st.sessions} | *Attendance:* ${st.attendRate.toFixed(0)}%\n`;
  txt+=`*Overall Score:* ${st.overall.toFixed(1)} / 5.0\n\n`;
  
  (typeof REPORT_CATS!=='undefined'?REPORT_CATS:SKILL_CATS).forEach(cat=>{
    const cd=st.byCat[cat.id];
    if(!cd||cd.avg===0)return;
    const trend=cd.trend>0.1?' ↑':cd.trend<-0.1?' ↓':'';
    txt+=`\n${cat.icon} *${cat.name}:* ${cd.avg.toFixed(1)}/5${trend}\n`;
    cat.skills.forEach(sk=>{
      const sd=st.bySkill?.[sk.id];
      if(!sd)return;
      const st2=sd.trend>0.1?' ↑':sd.trend<-0.1?' ↓':'';
      txt+=`   ${sk.name} (${sk.nameAr}): ${sd.avg.toFixed(1)}${st2}\n`;
    });
  });
  
  txt+=`\n━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`_HOST Academy - House of Sports Talents_\n`;
  txt+=`_Empowering Future Champions_`;
  
  document.getElementById('waReport').classList.remove('hidden');
  document.getElementById('waText').textContent=txt;
}

function copyReport(){
  const txt=document.getElementById('waText').textContent;
  navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied!');
  });
}

function renderAdminMessages(){
  return `<h2 class="title">Messages / رسائل</h2>
    <div class="card"><div class="card-b">
      <textarea class="fi" id="msgText" placeholder="Write a message for all parents... / اكتب رسالة لجميع أولياء الأمور"></textarea>
      <button class="btn btn-p btn-full" style="margin-top:8px" onclick="sendMsg()">📢 Send to All Parents</button>
    </div></div>
    ${state.data.messages.map(m=>{
      const isCheckin=m.type==='parent_checkin'||String(m.text).startsWith('PRE-TRAINING:');
      const isFeedback=m.type==='parent_feedback'||String(m.text).startsWith('MONTHLY FEEDBACK:');
      const bgColor=isCheckin?'#fef3c7':isFeedback?'#ede9fe':'#fff';
      const icon=isCheckin?'📝':isFeedback?'⭐':'📢';
      const label=isCheckin?'Parent Check-in':isFeedback?'Parent Feedback':'Announcement';
      return `<div class="card" style="border-left:3px solid ${isCheckin?'#d97706':isFeedback?'#7c3aed':'var(--blue)'}"><div class="card-b" style="background:${bgColor}">
        <div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--text3)">${fmtDate(m.date)}</span><span style="font-size:10px;font-weight:600;color:var(--text2)">${icon} ${label}</span></div>
        <div style="font-size:11px;font-weight:600;color:var(--text);margin-top:2px">${m.from_name||'HOST Academy'}</div>
        <div style="font-size:13px;margin-top:4px">${m.text}</div>
      </div></div>`;
    }).join('')}`;
}

async function sendMsg(){
  const text=document.getElementById('msgText').value.trim();
  if(!text){toast('Write a message');return}
  const ok=await apiPost({action:'sendMessage',message:{id:genId(),date:new Date().toISOString(),from_name:'HOST Academy',text,type:'announcement'}});
  if(ok){toast('Message sent!');render()}
}

function renderAdminData(){
  const d=state.data;
  let pinList=d.players.map(p=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:14px">
    <span>${p.name}</span><span style="font-weight:700;font-family:monospace;font-size:16px">${p.parent_pin}</span>
  </div>`).join('');
  
  return `<h2 class="title">Data Management</h2>
    <div class="card"><div class="card-b">
      <div class="info-box" style="margin-bottom:12px">👥 ${d.players.length} players · 📋 ${d.sessions.length} sessions · 📊 ${d.evaluations.length} evaluations · 📢 ${d.messages.length} messages</div>
      <button class="btn btn-p btn-full" style="margin-bottom:8px" onclick="exportData()">📥 Export All Data (JSON)</button>
      <button class="btn btn-full" style="margin-bottom:8px;background:none;border:1px solid var(--blue);color:var(--blue)" onclick="apiGet().then(()=>{render();toast('Data refreshed')})">🔄 Refresh Data from Google Sheet</button>
    </div></div>
    ${d.players.length?`<div class="card"><div class="card-h">Parent PINs (Share with parents)</div><div class="card-b">${pinList}</div></div>`:''}
    <div class="card"><div class="card-h">Settings</div><div class="card-b">
      <div class="fg"><label class="fl">Google Sheet API URL</label>
        <input class="fi" id="apiUrlEdit" value="${state.apiUrl}">
      </div>
      <button class="btn btn-s" onclick="state.apiUrl=document.getElementById('apiUrlEdit').value.trim();localStorage.setItem('host_api_url',state.apiUrl);toast('URL updated')">Update URL</button>
    </div></div>`;
}

function exportData(){
  const blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`host-academy-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('Data exported');
}

// ─── PARENT FORM SUBMISSIONS ───
async function submitParentCheckin(childId, childName){
  const sleep=document.getElementById('pf_sleep')?.value;
  const meal=document.getElementById('pf_meal')?.value;
  const mood=document.getElementById('pf_mood')?.value;
  const health=document.getElementById('pf_health')?.value||'';
  if(!sleep||!meal||!mood){toast('Please fill all fields / يرجى ملء جميع الحقول');return;}
  const msg={id:genId(),date:new Date().toISOString(),from_name:childName+' (Parent)',
    text:`PRE-TRAINING: Sleep: ${sleep} | Meal: ${meal} | Mood: ${mood} | Health: ${health||'OK'}`,
    type:'parent_checkin'};
  const ok=await apiPost({action:'sendMessage',message:msg});
  if(ok){toast('Check-in submitted! ✅ | تم الإرسال');state.parentTab='report';render();}
}

async function submitParentFeedback(childId, childName, parentName){
  const training=document.getElementById('fb_training')?.dataset?.val||'';
  const coach=document.getElementById('fb_coach')?.dataset?.val||'';
  const app=document.getElementById('fb_app')?.dataset?.val||'';
  const excited=document.getElementById('fb_excited')?.value||'';
  const recommend=document.getElementById('fb_recommend')?.value||'';
  const text=document.getElementById('fb_text')?.value||'';
  if(!training||!coach){toast('Please rate at least training and coach / يرجى تقييم التدريب والمدرب');return;}
  const msg={id:genId(),date:new Date().toISOString(),from_name:(parentName||'Parent')+' → '+childName,
    text:`MONTHLY FEEDBACK: Training: ${training}/5 | Coach: ${coach}/5 | App: ${app}/5 | Excited: ${excited} | Recommend: ${recommend} | Notes: ${text||'None'}`,
    type:'parent_feedback'};
  const ok=await apiPost({action:'sendMessage',message:msg});
  if(ok){toast('Thank you for your feedback! 🙏 | شكراً لرأيك');state.parentTab='report';render();}
}

// ─── INIT ───
apiGet().then(()=>render());
</script>
