<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1a56a8;--dark:#0f172a;--green:#059669;--gold:#d97706;--red:#dc2626;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;--text3:#94a3b8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}
button{cursor:pointer;-webkit-appearance:none;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:14px}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:14px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;white-space:nowrap}

/* Loading overlay */
#loading{position:fixed;inset:0;background:rgba(15,23,42,.7);display:none;align-items:center;justify-content:center;z-index:998}
#loading.show{display:flex}
#loading span{color:#fff;font-size:16px;font-weight:600}

/* Login */
.login{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e3a5f,#1a365d);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login h1{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px}
.login .sub{font-size:14px;color:rgba(255,255,255,.6);margin:4px 0 40px;text-align:center}
.login-btn{display:flex;align-items:center;gap:14px;width:100%;max-width:340px;padding:18px 20px;border:none;border-radius:14px;color:#fff;text-align:left;margin-bottom:12px;font-size:16px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.2);transition:transform .1s}
.login-btn:active{transform:scale(.97)}
.login-btn small{display:block;font-size:12px;font-weight:400;opacity:.8;margin-top:2px}

/* PIN screen */
.pin-screen{min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-screen h2{color:#fff;font-size:20px;font-weight:700;margin:16px 0 24px}
.pin-input{width:200px;padding:12px;border:2px solid #334155;border-radius:10px;background:#1e293b;color:#fff;font-size:28px;text-align:center;letter-spacing:10px;outline:none}
.pin-input:focus{border-color:var(--blue)}
.pin-btns{display:flex;gap:12px;margin-top:20px}

/* Header */
.header{padding:16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.header h2{font-size:18px;font-weight:800}
.header small{font-size:11px;opacity:.7;display:block;margin-top:1px}
.header-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600}

/* Nav */
.nav{display:flex;background:var(--card);border-bottom:1px solid var(--border)}
.nav button{flex:1;padding:10px 4px;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text2);border-bottom:2px solid transparent;font-size:10px}
.nav button.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.nav button .ni{font-size:18px}

/* Content */
.content{padding:16px;padding-bottom:80px}
.title{font-size:20px;font-weight:800;margin:0 0 16px;letter-spacing:-.3px}

/* Cards */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-h{padding:10px 16px;font-weight:700;font-size:12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;color:var(--text2);background:#f8fafc}
.card-b{padding:16px}

/* Forms */
.fg{margin-bottom:10px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2)}
.fi{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;background:var(--card);color:var(--text);outline:none}
.fi:focus{border-color:var(--blue)}
textarea.fi{min-height:60px;resize:vertical}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Buttons */
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600}
.btn-p{background:var(--blue);color:#fff}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-g{background:var(--green);color:#fff}
.btn-r{background:transparent;color:var(--red);border:1px solid var(--red)}
.btn-full{width:100%}
.btn-lg{padding:14px;font-size:16px}

/* Avatar */
.av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a56a8,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.av-lg{width:52px;height:52px;font-size:22px}

/* Player row */
.p-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.p-row:last-child{border:none}
.p-left{display:flex;align-items:center;gap:10px}
.p-name{font-weight:700;font-size:15px}
.p-sub{font-size:12px;color:var(--text2)}

/* Rating */
.rating{display:flex;gap:5px}
.rating button{width:42px;height:42px;border-radius:8px;border:2px solid var(--border);background:transparent;font-weight:700;font-size:16px;color:var(--text3);transition:all .15s}
.rating button.sel{color:#fff}
.rating.sm button{width:34px;height:34px;font-size:14px}
.r-label{font-size:11px;color:var(--text3);margin-top:3px;text-align:center;font-style:italic}

/* Progress bar */
.pbar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;transition:width .5s}

/* Info box */
.info-box{background:#f0f4f8;border-radius:10px;padding:10px 14px;font-size:13px}

/* Plan button */
.plan-btn{display:block;width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;text-align:left;font-size:13px;font-weight:500;margin-bottom:6px;transition:all .15s}
.plan-btn.sel{border-color:var(--blue);background:#eff6ff;color:#1e40af;font-weight:700}

/* Quick jump dots */
.dots{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:12px}
.dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.dot.cur{border-color:var(--blue);background:var(--blue);color:#fff}
.dot.done{border-color:var(--green);background:#ecfdf5;color:var(--green)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-weight:700;font-size:18px;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--text2);line-height:1.5}

/* Attend toggle */
.att-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8fafc;border-radius:10px;margin-bottom:16px}
.att-btn{padding:8px 20px;border:2px solid var(--border);border-radius:8px;background:transparent;font-weight:600;font-size:16px}

/* Score card */
.score-card{text-align:center;padding:24px;border-radius:16px;color:#fff;margin-bottom:16px}
.score-num{font-size:48px;font-weight:900}
.score-label{font-size:14px;opacity:.8;margin-top:4px}

/* Metric row */
.met-row{margin-bottom:14px}
.met-head{display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px}

/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)}

/* Setup screen */
.setup-card{background:var(--card);border-radius:16px;padding:24px;margin:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.setup-card h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--blue)}
.setup-card code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:13px;word-break:break-all}
</style>
</head>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════════════════════
// HOST ACADEMY v1.0 - Complete App
// ══════════════════════════════════════════════════════════════

const RATING_LABELS = ['','Needs Work','Developing','Good','Very Good','Excellent'];
const RATING_COLORS = ['','#dc2626','#ea580c','#d97706','#059669','#047857'];

const SKILL_CATS = [
  { id:'technical', name:'Technical Skills', nameAr:'المهارات الفنية', icon:'🏀', color:'#2563eb',
    skills: [
      {id:'ball_handling',name:'Ball Handling',nameAr:'التحكم بالكرة'},
      {id:'shooting',name:'Shooting',nameAr:'التصويب'},
      {id:'passing',name:'Passing',nameAr:'التمرير'},
      {id:'layups',name:'Layups',nameAr:'التسديد القريب'},
      {id:'defense',name:'Defense',nameAr:'الدفاع'},
    ]},
  { id:'athletic', name:'Athletic', nameAr:'التطور البدني', icon:'💪', color:'#059669',
    skills: [
      {id:'speed_agility',name:'Speed & Agility',nameAr:'السرعة والرشاقة'},
      {id:'coordination',name:'Coordination',nameAr:'التنسيق والتوازن'},
      {id:'endurance',name:'Endurance',nameAr:'التحمل'},
    ]},
  { id:'iq', name:'Basketball IQ', nameAr:'ذكاء كرة السلة', icon:'🧠', color:'#7c3aed',
    skills: [
      {id:'court_awareness',name:'Court Awareness',nameAr:'الوعي بالملعب'},
      {id:'decision_making',name:'Decision Making',nameAr:'اتخاذ القرار'},
    ]},
  { id:'character', name:'Character & Life', nameAr:'الشخصية والحياة', icon:'⭐', color:'#d97706',
    skills: [
      {id:'effort',name:'Effort & Discipline',nameAr:'الجهد والانضباط'},
      {id:'teamwork',name:'Teamwork',nameAr:'العمل الجماعي'},
      {id:'sportsmanship',name:'Sportsmanship',nameAr:'الروح الرياضية'},
      {id:'coachability',name:'Coachability',nameAr:'تقبل التوجيه'},
      {id:'leadership',name:'Leadership',nameAr:'القيادة'},
    ]},
];

const QUICK_SKILLS = ['ball_handling','speed_agility','court_awareness','effort','teamwork'];

const PLANS = [
  {id:'bh',name:'🏀 Ball Handling Day',life:'Persistence & Practice'},
  {id:'sh',name:'🎯 Shooting Day',life:'Resilience & Handling Failure'},
  {id:'pt',name:'🤝 Passing & Teamwork',life:'Teamwork & Selflessness'},
  {id:'df',name:'🛡️ Defense Day',life:'Hard Work & Responsibility'},
  {id:'gd',name:'🏆 Game Day',life:'Winning & Losing with Grace'},
  {id:'fn',name:'🎉 Fun & Challenges',life:'Joy & Creativity'},
];

// ─── STATE ───
let state = {
  mode: null, // null,'coach','parent','admin','setup'
  apiUrl: localStorage.getItem('host_api_url') || 'https://script.google.com/macros/s/AKfycbxcr054mpOObgU8XGohNE8c_5ENyF9244mCs0H63ozg_r0-TG_XoWbOqwBqMMvQrT3W/exec',
  adminPin: '0000',
  data: { players:[], sessions:[], evaluations:[], messages:[] },
  // Coach
  coachTab: 'evaluate',
  sessionCoach: '',
  sessionPlan: null,
  evalMode: 'quick',
  activeSession: null,
  sessionEvals: [],
  evalIndex: 0,
  sessionNotes: '',
  // Parent
  selectedChildId: null,
  // Admin
  adminTab: 'players',
  selectedPlayerReport: null,
};

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}

// ─── TOAST ───
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

// ─── LOADING ───
function showLoad(v){document.getElementById('loading').classList.toggle('show',v)}

// ─── API ───
async function apiGet(){
  if(!state.apiUrl)return state.data;
  showLoad(true);
  try{
    const r=await fetch(state.apiUrl+'?action=getAll');
    const d=await r.json();
    if(d.success){
      // Parse evaluations skills_json
      d.evaluations=(d.evaluations||[]).map(e=>({
        ...e,
        attended: e.attended === true || e.attended === 'true' || e.attended === 'TRUE',
        skills: typeof e.skills_json==='string'? JSON.parse(e.skills_json||'{}') : (e.skills_json||{}),
      }));
      d.players=(d.players||[]).map(p=>({
        ...p,
        active: p.active !== false && p.active !== 'false' && p.active !== 'FALSE',
        age: Number(p.age)||0,
        height_cm: Number(p.height_cm)||0,
        weight_kg: Number(p.weight_kg)||0,
      }));
      state.data=d;
    }
  }catch(e){console.error('API error:',e);toast('Offline - using cached data')}
  showLoad(false);
  return state.data;
}

async function apiPost(body){
  if(!state.apiUrl){toast('Set up Google Sheet first');return false}
  showLoad(true);
  try{
    const r=await fetch(state.apiUrl,{method:'POST',body:JSON.stringify(body),headers:{'Content-Type':'text/plain'}});
    const d=await r.json();
    showLoad(false);
    if(d.success){await apiGet();return true}
    else{toast('Error: '+(d.error||'Unknown'));return false}
  }catch(e){showLoad(false);toast('Network error');return false}
}

// ─── STATS ───
function getPlayerStats(pid){
  const evals=state.data.evaluations.filter(e=>e.player_id===pid&&e.attended);
  if(!evals.length)return null;
  const latest=evals[evals.length-1];
  const byCat={};
  SKILL_CATS.forEach(cat=>{
    const sids=cat.skills.map(s=>s.id);
    const catVals=evals.map(ev=>{
      const vals=sids.map(s=>Number(ev.skills?.[s])||0).filter(v=>v>0);
      return vals.length?avg(vals):0;
    }).filter(v=>v>0);
    const latVals=sids.map(s=>Number(latest.skills?.[s])||0).filter(v=>v>0);
    byCat[cat.id]={
      avg:avg(catVals),
      latest:avg(latVals),
      trend:catVals.length>=2?catVals[catVals.length-1]-catVals[catVals.length-2]:0
    };
  });
  const allAvgs=Object.values(byCat).map(c=>c.avg).filter(v=>v>0);
  const overall=avg(allAvgs);
  const allEvals=state.data.evaluations.filter(e=>e.player_id===pid);
  const attendRate=allEvals.length?(allEvals.filter(e=>e.attended).length/allEvals.length*100):0;
  return{sessions:evals.length,byCat,overall,attendRate};
}

// ─── RENDER ───
function render(){
  const app=document.getElementById('app');
  
  // Setup screen
  if(!state.apiUrl||state.mode==='setup'){
    app.innerHTML=renderSetup();
    return;
  }
  
  // Login screen
  if(!state.mode){
    app.innerHTML=renderLogin();
    return;
  }
  
  if(state.mode==='pin_admin'){app.innerHTML=renderPinScreen('Admin','admin','0000','⚙️');return}
  if(state.mode==='pin_parent'){app.innerHTML=renderPinScreen('Parent','parent',null,'👨‍👩‍👧‍👦');return}
  
  if(state.mode==='coach')app.innerHTML=renderCoach();
  else if(state.mode==='parent')app.innerHTML=renderParent();
  else if(state.mode==='admin')app.innerHTML=renderAdmin();
}

// ─── SETUP ───
function renderSetup(){
  return `<div class="login">
    <div style="font-size:72px">🏀</div>
    <h1>HOST Academy</h1>
    <div class="sub">First-time Setup</div>
    <div class="setup-card">
      <h3>Connect to Google Sheet</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Enter your Google Apps Script URL. Follow the setup guide document for instructions.</p>
      <div class="fg">
        <label class="fl">Apps Script Web App URL</label>
        <input class="fi" id="apiUrlInput" placeholder="https://script.google.com/macros/s/..." value="${state.apiUrl}">
      </div>
      <button class="btn btn-p btn-full" onclick="saveApiUrl()">Connect & Start</button>
      ${state.apiUrl?'<button class="btn btn-s btn-full" style="margin-top:8px" onclick="state.mode=null;render()">← Back to Login</button>':''}
    </div>
  </div>`;
}

function saveApiUrl(){
  const url=document.getElementById('apiUrlInput').value.trim();
  if(!url){toast('Enter the URL');return}
  state.apiUrl=url;
  localStorage.setItem('host_api_url',url);
  state.mode=null;
  apiGet().then(()=>render());
  toast('Connected!');
}

// ─── LOGIN ───
function renderLogin(){
  return `<div class="login">
    <div style="font-size:72px">🏀</div>
    <h1>HOST Academy</h1>
    <div class="sub">House of Sports Talents<br>Empowering Future Champions</div>
    <button class="login-btn" style="background:linear-gradient(135deg,#2563eb,#1d4ed8)" onclick="state.mode='coach';apiGet().then(()=>render())">
      📋 <div>Coach Access<small>دخول المدرب</small></div>
    </button>
    <button class="login-btn" style="background:linear-gradient(135deg,#059669,#047857)" onclick="state.mode='pin_parent';render()">
      👨‍👩‍👧‍👦 <div>Parent Access<small>دخول ولي الأمر</small></div>
    </button>
    <button class="login-btn" style="background:linear-gradient(135deg,#7c3aed,#6d28d9)" onclick="state.mode='pin_admin';render()">
      ⚙️ <div>Admin<small>الإدارة</small></div>
    </button>
    <button style="background:none;border:none;color:rgba(255,255,255,.3);font-size:11px;margin-top:20px" onclick="state.mode='setup';render()">⚙ Settings</button>
    <div style="color:rgba(255,255,255,.3);font-size:11px;margin-top:8px">HOST Academy v1.0 © 2025</div>
  </div>`;
}

// ─── PIN SCREEN ───
function renderPinScreen(label,targetMode,fixedPin,icon){
  return `<div class="pin-screen">
    <div style="font-size:48px">${icon}</div>
    <h2>${label} Access</h2>
    <p style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px;text-align:center">
      ${targetMode==='parent'?'Enter your child\'s PIN | أدخل رمز طفلك':'Enter Admin PIN | أدخل رمز الإدارة'}
    </p>
    <input type="password" maxlength="4" class="pin-input" id="pinVal" placeholder="····" onkeyup="if(event.key==='Enter')checkPin('${targetMode}')">
    <div class="pin-btns">
      <button class="btn btn-s" style="color:#fff;border-color:#475569" onclick="state.mode=null;render()">Back</button>
      <button class="btn btn-p" onclick="checkPin('${targetMode}')">Enter</button>
    </div>
  </div>`;
}

function checkPin(target){
  const pin=document.getElementById('pinVal').value;
  if(target==='admin'){
    if(pin===state.adminPin){state.mode='admin';apiGet().then(()=>render())}
    else toast('Wrong PIN');
  } else if(target==='parent'){
    const child=state.data.players.find(p=>p.parent_pin===pin);
    if(child){state.selectedChildId=child.id;state.mode='parent';apiGet().then(()=>render())}
    else{apiGet().then(()=>{
      const c2=state.data.players.find(p=>p.parent_pin===pin);
      if(c2){state.selectedChildId=c2.id;state.mode='parent';render()}
      else toast('Invalid PIN | رمز غير صحيح');
    })}
  }
}

// ─── HEADER ───
function hdr(title,sub,color){
  return `<div class="header" style="background:linear-gradient(135deg,${color},${color}dd)">
    <div><h2>🏀 ${title}</h2><small>${sub}</small></div>
    <button class="header-btn" onclick="state.mode=null;state.coachTab='evaluate';state.adminTab='players';state.activeSession=null;render()">Logout</button>
  </div>`;
}

// ═══════════════════════════════════════
// COACH MODE
// ═══════════════════════════════════════
function renderCoach(){
  const tabs=[{id:'evaluate',l:'New Session',i:'📋'},{id:'plans',l:'Plans',i:'📖'},{id:'history',l:'History',i:'📊'}];
  let nav=`<div class="nav">${tabs.map(t=>`<button class="${state.coachTab===t.id?'active':''}" onclick="state.coachTab='${t.id}';render()"><span class="ni">${t.i}</span>${t.l}</button>`).join('')}</div>`;
  
  if(state.coachTab==='evaluating'&&state.activeSession) return hdr('Coach','المدرب','#1e40af')+renderEvaluating();
  if(state.coachTab==='summary'&&state.activeSession) return hdr('Coach','المدرب','#1e40af')+renderSessionSummary();
  
  let content='';
  if(state.coachTab==='evaluate') content=renderNewSession();
  else if(state.coachTab==='plans') content=renderPlans();
  else if(state.coachTab==='history') content=renderHistory();
  
  return hdr('Coach','المدرب','#1e40af')+nav+`<div class="content">${content}</div>`;
}

function renderNewSession(){
  const players=state.data.players.filter(p=>p.active);
  const planBtns=PLANS.map(p=>`<button class="plan-btn ${state.sessionPlan===p.id?'sel':''}" onclick="state.sessionPlan=state.sessionPlan==='${p.id}'?null:'${p.id}';render()">${p.name}<br><small style="color:var(--gold)">⭐ ${p.life}</small></button>`).join('');
  
  return `<h2 class="title">Start New Session</h2>
    <div class="card"><div class="card-h">Session Setup</div><div class="card-b">
      <div class="fg"><label class="fl">Coach Name / اسم المدرب</label>
        <input class="fi" id="coachName" value="${state.sessionCoach}" placeholder="Who is coaching?" oninput="state.sessionCoach=this.value"></div>
      <div class="fg"><label class="fl">Training Plan (Optional)</label>${planBtns}</div>
      <div class="fg"><label class="fl">Evaluation Mode</label>
        <div style="display:flex;gap:8px">
          <button class="plan-btn ${state.evalMode==='quick'?'sel':''}" style="flex:1" onclick="state.evalMode='quick';render()">⚡ Quick (5 skills)</button>
          <button class="plan-btn ${state.evalMode==='detailed'?'sel':''}" style="flex:1" onclick="state.evalMode='detailed';render()">📊 Detailed (15)</button>
        </div></div>
      <div class="info-box" style="margin:12px 0">📅 ${fmtDate(new Date())} · 👥 ${players.length} players</div>
      <button class="btn btn-p btn-full btn-lg" onclick="startSession()" ${players.length?'':'disabled'}>🏀 Start Evaluations (${players.length} players)</button>
    </div></div>`;
}

function startSession(){
  const players=state.data.players.filter(p=>p.active);
  if(!players.length){toast('Add players first');return}
  state.activeSession={id:genId(),date:new Date().toISOString(),coach:state.sessionCoach,plan:state.sessionPlan};
  state.evalIndex=0;
  state.sessionEvals=players.map(p=>({player_id:p.id,player_name:p.name,attended:true,skills:{},notes:''}));
  state.coachTab='evaluating';
  render();
}

function renderEvaluating(){
  const ev=state.sessionEvals[state.evalIndex];
  const total=state.sessionEvals.length;
  const pct=Math.round(((state.evalIndex+1)/total)*100);
  const isQuick=state.evalMode==='quick';
  
  // Skills to show
  let skillsHtml='';
  SKILL_CATS.forEach(cat=>{
    const skills=isQuick?cat.skills.filter(s=>QUICK_SKILLS.includes(s.id)):cat.skills;
    if(!skills.length)return;
    skillsHtml+=`<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:${cat.color};margin-bottom:8px">${cat.icon} ${cat.name}</div>
      ${skills.map(sk=>{
        const val=ev.skills[sk.id]||0;
        return `<div style="margin-bottom:12px;padding-left:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px;font-weight:600">${sk.name} <span style="color:var(--text3);font-size:11px">${sk.nameAr}</span></span>
            ${val?`<span style="font-size:11px;color:${RATING_COLORS[val]};font-weight:600">${RATING_LABELS[val]}</span>`:''}
          </div>
          <div class="rating${isQuick?'':' sm'}">${[1,2,3,4,5].map(v=>
            `<button class="${val===v?'sel':''}" style="${val===v?`background:${RATING_COLORS[v]};border-color:${RATING_COLORS[v]}`:''}" onclick="rateSkill('${sk.id}',${v})">${v}</button>`
          ).join('')}</div>
        </div>`;
      }).join('')}
    </div>`;
  });
  
  // Dots
  const dots=state.sessionEvals.map((e,i)=>{
    const done=Object.keys(e.skills||{}).length>0;
    return `<button class="dot ${i===state.evalIndex?'cur':done?'done':''}" onclick="state.evalIndex=${i};render()">${e.player_name.charAt(0)}</button>`;
  }).join('');
  
  return `<div class="content">
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:4px">
        <span>Player ${state.evalIndex+1} / ${total}</span><span>${pct}%</span>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:var(--blue)"></div></div>
    </div>
    <div class="card" style="overflow:visible">
      <div style="display:flex;align-items:center;gap:14px;padding:16px;border-bottom:1px solid var(--border)">
        <div class="av av-lg">${ev.player_name.charAt(0)}</div>
        <div style="font-size:22px;font-weight:800">${ev.player_name}</div>
      </div>
      <div class="card-b">
        <div class="att-row">
          <span style="font-weight:600">Attended? / حضر؟</span>
          <div style="display:flex;gap:8px">
            <button class="att-btn" style="${ev.attended?'border-color:var(--green);background:#ecfdf5;color:var(--green)':''}" onclick="setAttend(true)">✓</button>
            <button class="att-btn" style="${!ev.attended?'border-color:var(--red);background:#fef2f2;color:var(--red)':''}" onclick="setAttend(false)">✗</button>
          </div>
        </div>
        ${ev.attended?skillsHtml+'<div class="fg"><label class="fl">Notes / ملاحظات</label><textarea class="fi" id="evalNote" placeholder="Quick notes..." oninput="state.sessionEvals[state.evalIndex].notes=this.value">'+ev.notes+'</textarea></div>':'<div class="info-box" style="text-align:center;padding:20px">❌ Absent - No evaluation needed</div>'}
        <div style="display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <button class="btn btn-s" onclick="navEval(-1)" ${state.evalIndex===0?'disabled':''}>← Prev</button>
          ${state.evalIndex<total-1?
            `<button class="btn btn-p" onclick="navEval(1)">Next →</button>`:
            `<button class="btn btn-g" onclick="state.coachTab='summary';render()">Review & Save ✓</button>`}
        </div>
      </div>
    </div>
    <div class="dots">${dots}</div>
  </div>`;
}

function setAttend(v){
  state.sessionEvals[state.evalIndex].attended=v;
  if(!v)state.sessionEvals[state.evalIndex].skills={};
  render();
}
function rateSkill(skillId,val){
  state.sessionEvals[state.evalIndex].skills[skillId]=val;
  render();
}
function navEval(dir){
  state.evalIndex=Math.max(0,Math.min(state.sessionEvals.length-1,state.evalIndex+dir));
  render();
}

function renderSessionSummary(){
  const attended=state.sessionEvals.filter(e=>e.attended);
  const rows=attended.map(e=>{
    const rated=Object.values(e.skills||{}).filter(v=>v>0);
    return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9">
      <span style="font-weight:600">${e.player_name}</span>
      <span style="font-size:13px;color:${rated.length?'var(--green)':'var(--red)'}">${rated.length?`Avg: ${avg(rated).toFixed(1)}/5 (${rated.length} skills)`:'Not rated'}</span>
    </div>`;
  }).join('');
  
  return `<div class="content">
    <h2 class="title">Session Summary</h2>
    <div class="card"><div class="card-h">Review Before Saving</div><div class="card-b">
      <div class="info-box" style="margin-bottom:12px">
        📅 ${fmtDate(state.activeSession.date)}<br>
        👤 Coach: ${state.activeSession.coach||'—'}<br>
        ✅ Attended: ${attended.length} / ${state.sessionEvals.length}<br>
        ❌ Absent: ${state.sessionEvals.length-attended.length}
      </div>
      ${rows}
      <div class="fg" style="margin-top:12px"><label class="fl">Session Notes</label>
        <textarea class="fi" id="sessNote" placeholder="Overall notes..." oninput="state.sessionNotes=this.value">${state.sessionNotes}</textarea></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-s" onclick="state.coachTab='evaluating';render()">← Edit</button>
        <button class="btn btn-g" style="flex:1" onclick="saveSession()">✓ Save Session</button>
      </div>
    </div></div>
  </div>`;
}

async function saveSession(){
  const session={...state.activeSession,notes:state.sessionNotes,completed:true};
  const evals=state.sessionEvals.map(e=>({...e,session_id:session.id}));
  const ok=await apiPost({action:'saveSession',session,evaluations:evals});
  if(ok){
    state.activeSession=null;state.sessionEvals=[];state.sessionCoach='';state.sessionNotes='';state.sessionPlan=null;
    state.coachTab='evaluate';
    toast('Session saved! 🏀');
    render();
  }
}

function renderPlans(){
  return `<h2 class="title">Training Plans / خطط التدريب</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:16px">Rotate through these plans each week. Each 2-hour session follows: Warm-up (10min) → Drills (30min) → Break → Drills (30min) → Break → Game (30min) → Cool-down (10min)</p>
    ${PLANS.map(p=>`<div class="card"><div class="card-b">
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${p.name}</div>
      <div style="background:#fef3c7;border-radius:8px;padding:8px 12px;font-weight:600;font-size:13px">⭐ Life Skill: ${p.life}</div>
    </div></div>`).join('')}
    <p style="font-size:12px;color:var(--text3);text-align:center">See the Coach Guidance Manual for full drill details.</p>`;
}

function renderHistory(){
  if(!state.data.sessions.length)return `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">No sessions yet</div></div>`;
  return `<h2 class="title">Session History</h2>`+
    state.data.sessions.slice().reverse().map(s=>{
      const evals=state.data.evaluations.filter(e=>e.session_id===s.id);
      const att=evals.filter(e=>e.attended);
      return `<div class="card"><div class="card-b">
        <div style="display:flex;justify-content:space-between"><b>${fmtDate(s.date)}</b><span style="font-size:13px;color:var(--text2)">Coach: ${s.coach||'—'}</span></div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px">✅ ${att.length} attended · ❌ ${evals.length-att.length} absent</div>
        ${s.notes?`<div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px">"${s.notes}"</div>`:''}
      </div></div>`;
    }).join('');
}

function renderParent(){
  const child=state.data.players.find(p=>p.id===state.selectedChildId);
  if(!child)return '<div>Child not found</div>';
  const stats=getPlayerStats(child.id);
  
  let content=`<div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #a7f3d0">
    <div style="font-size:16px;font-weight:700;color:#047857;margin-bottom:4px">Welcome, ${child.parent_name||'Parent'} 👋</div>
    <div style="font-size:13px;color:#065f46">${child.name}'s progress at HOST Academy</div>
  </div>`;
  
  if(!stats){
    content+=`<div class="empty"><div class="empty-icon">🏀</div><div class="empty-title">No evaluations yet</div>
      <div class="empty-text">After the first session, you'll see ${child.name}'s progress here.</div></div>`;
  } else {
    content+=`<div class="score-card" style="background:linear-gradient(135deg,#047857,#065f46)">
      <div class="score-num">${stats.overall.toFixed(1)}</div>
      <div class="score-label">Overall Score / 5.0</div>
      <div style="display:flex;justify-content:center;gap:24px;margin-top:12px;font-size:13px">
        <div><b style="font-size:18px">${stats.sessions}</b><br>Sessions</div>
        <div><b style="font-size:18px">${stats.attendRate.toFixed(0)}%</b><br>Attendance</div>
      </div>
    </div>`;
    
    SKILL_CATS.forEach(cat=>{
      const cd=stats.byCat[cat.id];
      if(!cd||cd.avg===0)return;
      const trend=cd.trend>0.1?`<span style="color:var(--green);font-weight:700">↑ +${cd.trend.toFixed(1)}</span>`:
                  cd.trend<-0.1?`<span style="color:var(--red);font-weight:700">↓ ${cd.trend.toFixed(1)}</span>`:'<span style="color:var(--text3)">—</span>';
      const msg=cd.avg>=4?'Excellent! Keep it up! 🌟':cd.avg>=3?'Good progress! 💪':'Building foundations 🏀';
      content+=`<div class="card"><div class="card-h" style="color:${cat.color};border-left:4px solid ${cat.color}">${cat.icon} ${cat.name} — ${cat.nameAr}</div>
        <div class="card-b">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:24px;font-weight:800;color:${cat.color}">${cd.avg.toFixed(1)}</span>${trend}
          </div>
          <div class="pbar"><div class="pbar-fill" style="width:${(cd.avg/5)*100}%;background:${cat.color}"></div></div>
          <div style="font-size:12px;color:var(--text3);margin-top:6px">${msg}</div>
        </div></div>`;
    });
  }
  
  // Messages
  if(state.data.messages.length){
    content+=`<div class="card"><div class="card-h">📢 Academy Messages</div><div class="card-b">
      ${state.data.messages.slice(0,5).map(m=>`<div style="padding:10px 0;border-bottom:1px solid #f1f5f9">
        <div style="font-size:11px;color:var(--text3)">${fmtDate(m.date)}</div>
        <div style="font-size:14px;margin-top:2px">${m.text}</div>
      </div>`).join('')}
    </div></div>`;
  }
  
  content+=`<div class="footer">HOST Academy · House of Sports Talents<br>Empowering Future Champions – In Sport, In Life</div>`;
  
  return hdr(child.name,`Age ${child.age} · HOST Academy`,'#047857')+`<div class="content">${content}</div>`;
}

async function addPlayer(){
  const name=document.getElementById('np_name').value.trim();
  if(!name){toast('Enter a name');return}
  const pin=String(Math.floor(1000+Math.random()*9000));
  const player={
    id:genId(), name,
    age:document.getElementById('np_age').value||'',
    height_cm:document.getElementById('np_height').value||'',
    weight_kg:document.getElementById('np_weight').value||'',
    parent_name:document.getElementById('np_parent').value.trim(),
    parent_phone:document.getElementById('np_phone').value.trim(),
    parent_pin:pin,
    join_date:new Date().toISOString(),
    active:true,
    medical_notes:document.getElementById('np_medical').value.trim(),
  };
  const ok=await apiPost({action:'addPlayer',player});
  if(ok){toast(`${name} added (PIN: ${pin})`);document.getElementById('addPlayerForm').classList.add('hidden');render()}
}

      const st=getPlayerStats(p.id);

        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="p-left"><div class="av">${p.name.charAt(0)}</div><div>

      </div>
    </div>`;
  
  if(st){
    html+=`<div class="score-card" style="background:linear-gradient(135deg,#6d28d9,#4c1d95)">

    SKILL_CATS.forEach(cat=>{

function genWhatsAppReport(pid){
  const p=state.data.players.find(x=>x.id===pid);
  const st=getPlayerStats(pid);
  if(!p||!st)return;
  
  let txt=`🏀 *HOST Academy Progress Report*\n━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`*Player:* ${p.name}\n`;
  txt+=`*Age:* ${p.age} | *Sessions:* ${st.sessions} | *Attendance:* ${st.attendRate.toFixed(0)}%\n`;
  txt+=`*Overall Score:* ${st.overall.toFixed(1)} / 5.0\n\n`;
  
  SKILL_CATS.forEach(cat=>{
    const cd=st.byCat[cat.id];
    if(!cd||cd.avg===0)return;
    const trend=cd.trend>0.1?' ↑':cd.trend<-0.1?' ↓':'';
    txt+=`${cat.icon} *${cat.name}:* ${cd.avg.toFixed(1)}/5${trend}\n`;
  });
  
  txt+=`\n━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`_HOST Academy - House of Sports Talents_\n`;
  txt+=`_Empowering Future Champions_`;
  
  document.getElementById('waReport').classList.remove('hidden');
  document.getElementById('waText').textContent=txt;
}

function copyReport(){
  const txt=document.getElementById('waText').textContent;
  navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied!');
  });
}

function renderAdminMessages(){
  return `<h2 class="title">Messages / رسائل</h2>
    <div class="card"><div class="card-b">
      <textarea class="fi" id="msgText" placeholder="Write a message for all parents... / اكتب رسالة لجميع أولياء الأمور"></textarea>
      <button class="btn btn-p btn-full" style="margin-top:8px" onclick="sendMsg()">📢 Send to All Parents</button>
    </div></div>
    ${state.data.messages.map(m=>`<div class="card"><div class="card-b">
      <div style="font-size:11px;color:var(--text3)">${fmtDate(m.date)}</div>
      <div style="font-size:14px;margin-top:2px">${m.text}</div>
    </div></div>`).join('')}`;
}

async function sendMsg(){
  const text=document.getElementById('msgText').value.trim();
  if(!text){toast('Write a message');return}
  const ok=await apiPost({action:'sendMessage',message:{id:genId(),date:new Date().toISOString(),from_name:'HOST Academy',text,type:'announcement'}});
  if(ok){toast('Message sent!');render()}
}

function renderAdminData(){
  const d=state.data;
  let pinList=d.players.map(p=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:14px">
    <span>${p.name}</span><span style="font-weight:700;font-family:monospace;font-size:16px">${p.parent_pin}</span>
  </div>`).join('');
  
  return `<h2 class="title">Data Management</h2>
    <div class="card"><div class="card-b">
      <div class="info-box" style="margin-bottom:12px">👥 ${d.players.length} players · 📋 ${d.sessions.length} sessions · 📊 ${d.evaluations.length} evaluations · 📢 ${d.messages.length} messages</div>
      <button class="btn btn-p btn-full" style="margin-bottom:8px" onclick="exportData()">📥 Export All Data (JSON)</button>
      <button class="btn btn-full" style="margin-bottom:8px;background:none;border:1px solid var(--blue);color:var(--blue)" onclick="apiGet().then(()=>{render();toast('Data refreshed')})">🔄 Refresh Data from Google Sheet</button>
    </div></div>
    ${d.players.length?`<div class="card"><div class="card-h">Parent PINs (Share with parents)</div><div class="card-b">${pinList}</div></div>`:''}
    <div class="card"><div class="card-h">Settings</div><div class="card-b">
      <div class="fg"><label class="fl">Google Sheet API URL</label>
        <input class="fi" id="apiUrlEdit" value="${state.apiUrl}">
      </div>
      <button class="btn btn-s" onclick="state.apiUrl=document.getElementById('apiUrlEdit').value.trim();localStorage.setItem('host_api_url',state.apiUrl);toast('URL updated')">Update URL</button>
    </div></div>`;
}

function exportData(){
  const blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`host-academy-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('Data exported');
}

// ─── INIT ───
apiGet().then(()=>render());
</script>
</body>
</html>
