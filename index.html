ball_handling:{1:"Cannot dribble 5sec | لا يدربل 5 ثوان",2:"Stationary, dominant hand | ثابت يد واحدة",3:"Dribble through 5 cones, 0-1 losses | 5 أقماع بدون فقدان",4:"Both hands + crossover | يدين + كروس أوفر",5:"Under pressure + advanced moves | تحت ضغط + حركات متقدمة"},

speed_agility:{1:"Cannot complete T-test | لا يكمل الاختبار",2:"Very slow T-test | بطيء جداً",3:"Age-appropriate time | وقت مناسب لسنه",4:"Top 25% for age | أفضل 25%",5:"Top 10%, explosive | أفضل 10% انفجاري"},

court_awareness:{1:"Stands in one spot | يقف مكانه",2:"Follows ball only, 20-40% correct | يتبع الكرة 20-40%",3:"Finds spaces, 40-60% correct | يجد مساحات 40-60%",4:"Reads plays, 60-80% correct | يقرأ اللعب 60-80%",5:"Anticipates, 80%+ correct | يستبق 80%+"},
decision_making:{1:"0-2/10 good decisions | 0-2 قرارات جيدة",2:"3-4/10 good | 3-4",3:"5-6/10 good | 5-6",4:"7-8/10, smart under pressure | 7-8 تحت ضغط",5:"9-10/10, elite | 9-10 متميز"},

coachability:{1:"Ignores instructions | يتجاهل",2:"Listens, doesn't apply | يسمع لا يطبق",3:"Follows after 1-2 reps | يتبع بعد 1-2 تكرار",4:"Applies immediately | يطبق فوراً",5:"Self-corrects, asks questions | يصحح نفسه ويسأل"},
leadership:{1:"Completely passive | سلبي تماماً",2:"Participates when asked | عند الطلب",3:"Leads small tasks | يقود مهام صغيرة",4:"Encourages, organizes | يشجع وينظم",5:"Natural captain | كابتن طبيعي"}
};

const PLANS=[
  {id:"bh",nm:"🏀 Ball Handling Day",life:"Persistence"},
  {id:"sh",nm:"🎯 Shooting Day",life:"Resilience"},
  {id:"pt",nm:"🤝 Passing & Teamwork",life:"Selflessness"},
  {id:"df",nm:"🛡️ Defense Day",life:"Hard Work"},
  {id:"gd",nm:"🏆 Game Day",life:"Grace in Win/Loss"},
  {id:"fn",nm:"🎉 Fun & Challenges",life:"Joy & Creativity"}
];

// ─── AUTO RECOMMENDATIONS ────────────
function getRecs(skills,name,age){
  const recs={coach:[],parent:[],child:[]};
  if(!skills||!Object.keys(skills).length)return recs;
  const sorted=Object.entries(skills).sort((a,b)=>Number(a[1])-Number(b[1]));
  const weakest=sorted.filter(([k,v])=>Number(v)<=2).slice(0,3);
  const strongest=sorted.filter(([k,v])=>Number(v)>=4);

  const homeActs={
    ball_handling:{en:"Dribble any ball 5 min daily — 2 min left hand, 2 min right, 1 min alternating",ar:"دريبل 5 دقائق — دقيقتين يسار، دقيقتين يمين، دقيقة تبديل"},
    shooting:{en:"Practice BEEF form without hoop — Balance, Eyes, Elbow, Follow-through, 3 min",ar:"تمرين شكل BEEF بدون حلقة 3 دقائق"},
    passing:{en:"Wall passing — 3 min chest pass, 3 min bounce pass",ar:"تمرير على الحائط — 3 دقائق صدر و3 أرضي"},
    layups:{en:"Practice 1-2 step footwork without ball, then add ball",ar:"تمرين خطوات 1-2 بدون كرة ثم أضف الكرة"},
    defense:{en:"Mirror drill with family member — shadow movements 2 min",ar:"تمرين المرآة مع فرد من العائلة دقيقتين"},
    speed_agility:{en:"Running games — chase, tag, racing with siblings 15 min",ar:"ألعاب جري — مطاردة وسباق 15 دقيقة"},
    coordination:{en:"Jump rope 3 min + balance on one foot 30 sec each leg",ar:"نط حبل 3 دقائق + توازن 30 ثانية كل رجل"},
    endurance:{en:"Any continuous activity 15+ min — cycling, swimming, running",ar:"أي نشاط متواصل 15 دقيقة — دراجة، سباحة، جري"},
    court_awareness:{en:"Watch basketball highlights — ask where players should be",ar:"شاهد مقاطع كرة سلة واسأل أين يجب أن يكون اللاعبون"},
    decision_making:{en:"Play board games or strategy games that require thinking ahead",ar:"العب ألعاب لوحية تتطلب التفكير"},
    teamwork:{en:"Group activities — board games, team cooking, group projects",ar:"أنشطة جماعية — ألعاب لوحية، طبخ جماعي"},
    sportsmanship:{en:"Discuss wins/losses from TV sports — what is good behavior?",ar:"ناقش الفوز والخسارة من الرياضة على التلفزيون"},
    effort:{en:"Set a daily goal — ask before/after: what to improve? did you try your best?",ar:"ضع هدف يومي — اسأل قبل/بعد: ماذا تحسن؟ هل بذلت جهدك؟"},
    coachability:{en:"Practice active listening — repeat instructions before doing them",ar:"تمرين الاستماع — يكرر التعليمات قبل تنفيذها"},
    leadership:{en:"Give small responsibilities at home — organizing, helping siblings",ar:"أعطِ مسؤوليات صغيرة — تنظيم، مساعدة الإخوة"},
  };

  // Weakest skills → coach and parent recs
  weakest.forEach(([sid,v])=>{
    const sk=SK[sid];if(!sk)return;
    recs.coach.push("Focus on "+sk.n+" — currently "+v+"/5. Use extra drill time for this skill.");
    const ha=homeActs[sid];
    if(ha)recs.parent.push({skill:sk.n,skillAr:sk.a,en:ha.en,ar:ha.ar,done:false});
    recs.child.push("Practice "+sk.n+" this week! You can do it! 💪 | تمرن على "+sk.a+" هذا الأسبوع!");
  });

  // Strongest → celebrate
  strongest.forEach(([sid,v])=>{
    const sk=SK[sid];if(!sk)return;
    recs.coach.push("Celebrate "+sk.n+" ("+v+"/5) — challenge "+name+" with advanced drills.");
  });

  // Effort specific
  if(Number(skills.effort)<=2)recs.coach.push("PRIORITY: "+name+"'s effort is low. Use positive reinforcement. Set small achievable goals.");
  if(Number(skills.coachability)>=4)recs.coach.push(name+" is highly coachable — can help demonstrate drills to younger players.");
  if(Number(skills.teamwork)<=2)recs.coach.push("Pair "+name+" with a strong team player for drills to build teamwork naturally.");

  return recs;
}

// ─── STATE ───────────────────────────
let S={
  mode:null,d:{players:[],sessions:[],evaluations:[],messages:[]},
  ct:"evaluate",at:"players",pt:"report",kt:"scores",

// ─── UTILS ───────────────────────────
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fd(d){return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}
function av(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function rc(v){return v>=4?"#047857":v>=3?"#d97706":"#dc2626"}
function rl(v){return{1:"Needs Work",2:"Developing",3:"Good",4:"Very Good",5:"Excellent"}[Math.round(v)]||"—"}
function toast(m){const t=document.getElementById("T");t.textContent=m;t.style.display="block";setTimeout(()=>t.style.display="none",2500)}
function load(v){document.getElementById("L").classList.toggle("s",v)}

// ─── API ─────────────────────────────
async function api(){
  load(true);
  try{const r=await fetch(API+"?action=getAll");const d=await r.json();
    if(d.success){
      d.evaluations=(d.evaluations||[]).map(e=>({...e,attended:e.attended===true||e.attended==="true"||e.attended==="TRUE",skills:typeof e.skills_json==="string"?JSON.parse(e.skills_json||"{}"):e.skills_json||{}}));
      d.players=(d.players||[]).map(p=>({...p,active:p.active!==false&&p.active!=="false",age:Number(p.age)||0,height_cm:Number(p.height_cm)||0,weight_kg:Number(p.weight_kg)||0}));
      S.d=d;
    }
  }catch(e){toast("Offline mode")}
  load(false);
}
async function post(body){
  load(true);
  try{const r=await fetch(API,{method:"POST",body:JSON.stringify(body),headers:{"Content-Type":"text/plain"}});const d=await r.json();load(false);
    if(d.success){await api();return true}toast("Error: "+(d.error||"?"));return false;
  }catch(e){load(false);toast("Network error");return false}
}

// ─── STATS ───────────────────────────
function stats(pid){
  const ev=S.d.evaluations.filter(e=>e.player_id===pid&&e.attended);
  if(!ev.length)return null;
  const lat=ev[ev.length-1];const byCat={};
  RCATS.forEach(cat=>{
    const vals=ev.map(e=>{const v=cat.sk.map(s=>Number(e.skills?.[s])||0).filter(x=>x>0);return v.length?av(v):0}).filter(x=>x>0);
    const lv=cat.sk.map(s=>Number(lat.skills?.[s])||0).filter(x=>x>0);
    byCat[cat.id]={avg:av(vals),trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0};
  });
  const bySk={};
  RCATS.forEach(cat=>cat.sk.forEach(sid=>{
    const vals=ev.map(e=>Number(e.skills?.[sid])||0).filter(x=>x>0);
    if(vals.length)bySk[sid]={avg:av(vals),trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0};
  }));
  const overall=av(Object.values(byCat).map(c=>c.avg).filter(x=>x>0));
  const allEv=S.d.evaluations.filter(e=>e.player_id===pid);
  const att=allEv.length?(allEv.filter(e=>e.attended).length/allEv.length*100):0;
  return{sessions:ev.length,byCat,bySk,overall,att,latest:lat};
}

function makeRadar(skills){
  const sz=220,cx=sz/2,cy=sz/2,r=sz/2-32,ids=["ball_handling","speed_agility","court_awareness","effort","teamwork"],lb=["Ball","Speed","Court","Effort","Team"],n=ids.length;
  let s='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+" "+sz+'">';
  for(let l=1;l<=5;l++){let p=[];for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;p.push((cx+r*l/5*Math.cos(a)).toFixed(1)+","+(cy+r*l/5*Math.sin(a)).toFixed(1))}s+='<polygon points="'+p.join(" ")+'" fill="none" stroke="#e2e8f0" stroke-width="1"/>';}
  let p=[];for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;const v=Number(skills[ids[i]])||0;p.push((cx+r*v/5*Math.cos(a)).toFixed(1)+","+(cy+r*v/5*Math.sin(a)).toFixed(1));s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#e2e8f0"/>';}
  s+='<polygon points="'+p.join(" ")+'" fill="rgba(26,86,168,.15)" stroke="#1a56a8" stroke-width="2.5"/>';
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;const v=Number(skills[ids[i]])||0;s+='<circle cx="'+(cx+r*v/5*Math.cos(a)).toFixed(1)+'" cy="'+(cy+r*v/5*Math.sin(a)).toFixed(1)+'" r="3.5" fill="#1a56a8"/>';const x=cx+(r+22)*Math.cos(a),y=cy+(r+22)*Math.sin(a);s+='<text x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">'+lb[i]+'</text>';}
  s+='</svg>';return s;
}

// ─── SKILL ANALYSIS TEXT ─────────────
function skTxt(sid,v,name){
  const t={
    ball_handling:{h:name+" shows strong ball handling with confident control.",m:"Ball handling developing. More weak-hand practice recommended.",l:"Building ball handling foundations with stationary dribbling."},

function ckPin(t){
  const pin=document.getElementById("pv").value;
  if(t==="coach"){if(pin===PIN_COACH){S.mode="coach";api().then(R)}else toast("Wrong PIN")}
  else if(t==="admin"){if(pin===PIN_ADMIN){S.mode="admin";api().then(R)}else toast("Wrong PIN")}

    api().then(()=>{const ch=S.d.players.find(p=>p.parent_pin===pin);if(ch){S.cid=ch.id;S.mode="parent";S.pt="report";R()}else toast("Invalid PIN")});

function startS(){
  const pl=S.d.players.filter(p=>p.active);if(!pl.length){toast("Add players first");return}
  const today=new Date().toISOString().slice(0,10);
  const ex=S.d.sessions.find(s=>s.date&&s.date.slice(0,10)===today);
  if(ex&&!S.edit){S.dup=ex;R();return}
  S.sess={id:S.edit?S.edit.id:gid(),date:S.edit?S.edit.date:new Date().toISOString(),coach:S.coach,plan:S.plan,edited:!!S.edit};
  S.ei=0;
  if(S.edit){
    const old=S.d.evaluations.filter(e=>e.session_id===S.edit.id);
    S.evals=pl.map(p=>{const o=old.find(e=>e.player_id===p.id);return o?{pid:p.id,pn:p.name,att:o.attended,sk:{...(o.skills||{})},nt:o.notes||""}:{pid:p.id,pn:p.name,att:true,sk:{},nt:""}});
  }else S.evals=pl.map(p=>({pid:p.id,pn:p.name,att:true,sk:{},nt:""}));
  S.edit=null;S.dup=null;S.ct="evaluating";R();
}

async function saveSess(){
  const session={...S.sess,notes:S.sn,completed:true};
  const evals=S.evals.map(e=>({session_id:session.id,player_id:e.pid,player_name:e.pn,attended:e.att,skills:e.sk,notes:e.nt}));
  if(await post({action:"saveSession",session,evaluations:evals})){S.sess=null;S.evals=[];S.coach="";S.sn="";S.plan=null;S.ct="evaluate";toast(session.edited?"Updated! \u270F\uFE0F":"Saved! \uD83C\uDFC0");R()}

  const lat=st.latest.skills||{};

  // Score card
  h+='<div style="background:linear-gradient(135deg,#0f172a,#1e40af);border-radius:16px;padding:24px;color:#fff;margin-bottom:16px;text-align:center"><div style="font-size:11px;opacity:.6;letter-spacing:2px;margin-bottom:8px">\uD83C\uDFC0 HOST ACADEMY REPORT</div><div style="display:flex;justify-content:space-around"><div><div style="font-size:36px;font-weight:900">'+st.overall.toFixed(1)+'</div><div style="font-size:11px;opacity:.7">Overall</div></div><div><div style="font-size:36px;font-weight:900">'+st.sessions+'</div><div style="font-size:11px;opacity:.7">Sessions</div></div><div><div style="font-size:36px;font-weight:900">'+st.att.toFixed(0)+'%</div><div style="font-size:11px;opacity:.7">Attendance</div></div></div></div>';

  // Physical
  if(ch.height_cm||ch.weight_kg){
    h+='<div style="display:flex;gap:8px;margin-bottom:16px">';

    if(ch.weight_kg)h+='<div style="flex:1;background:#f0fdf4;border-radius:10px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--t2)">Weight</div><div style="font-size:18px;font-weight:800;color:#047857">'+ch.weight_kg+'kg</div></div>';
    h+='<div style="flex:1;background:#fdf4ff;border-radius:10px;padding:10px;text-align:center"><div style="font-size:10px;color:var(--t2)">Age</div><div style="font-size:18px;font-weight:800;color:#7c3aed">'+ch.age+'</div></div></div>';
  }

  // Session dates
  const chSess=S.d.sessions.filter(s=>S.d.evaluations.some(e=>e.session_id===s.id&&e.player_id===ch.id&&e.attended));
  if(chSess.length)h+='<div style="background:#f8fafc;border:1px solid var(--br);border-radius:10px;padding:10px;margin-bottom:12px;font-size:12px;color:var(--t2)"><b>\uD83D\uDCC5 Sessions:</b> '+chSess.map(s=>fd(s.date)).join(" \u00B7 ")+'</div>';

  h+='<div style="text-align:center;margin:16px 0"><div style="font-weight:700;margin-bottom:8px">\uD83D\uDCCA Skills Overview</div>'+makeRadar(lat)+'</div>';

  // Skills analysis
  h+='<div style="font-weight:700;font-size:16px;margin:20px 0 12px">\uD83D\uDCCB Detailed Analysis / تحليل تفصيلي</div>';
  RCATS.forEach(cat=>{
    const cd=st.byCat[cat.id];if(!cd||cd.avg===0)return;
    h+='<div class="cd" style="margin-bottom:14px"><div class="ch" style="color:'+cat.cl+';border-left:4px solid '+cat.cl+';display:flex;justify-content:space-between"><span>'+cat.ic+' '+cat.nm+' \u2014 '+cat.ar+'</span><span style="font-weight:800;font-size:16px">'+cd.avg.toFixed(1)+'/5</span></div><div class="cb"><div class="pb" style="margin-bottom:14px"><div class="pf" style="width:'+cd.avg/5*100+'%;background:'+cat.cl+'"></div></div>';
    cat.sk.forEach(sid=>{
      const sd=st.bySk[sid];if(!sd)return;const sk=SK[sid];if(!sk)return;
      const v=Math.round(sd.avg);const txt=skTxt(sid,v,ch.name);
      h+='<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f1f5f9"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:600;font-size:13px">'+sk.n+' \u2014 '+sk.a+'</span><span style="background:'+rc(v)+';color:#fff;padding:2px 10px;border-radius:12px;font-weight:800;font-size:13px">'+v+'/5</span></div>';
      h+='<p style="font-size:12px;color:#334155;line-height:1.5;margin:4px 0 0">'+txt+'</p></div>';
    });
    h+='</div></div>';
  });

  // Strengths
  const strong=Object.entries(lat).filter(([k,v])=>Number(v)>=4).sort((a,b)=>Number(b[1])-Number(a[1])).slice(0,3);
  if(strong.length){
    h+='<div style="background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;padding:14px;margin:16px 0"><div style="font-weight:700;color:#047857;margin-bottom:8px">\uD83C\uDF1F Strengths / نقاط القوة</div>';
    strong.forEach(([sid,v])=>{const sk=SK[sid];if(sk)h+='<div style="display:flex;justify-content:space-between;padding:4px 0"><span>'+sk.n+' \u2014 '+sk.a+'</span><span style="font-weight:800;color:#047857">'+v+'/5</span></div>'});
    h+='</div>';
  }

  // Focus areas with targets
  const weak=Object.entries(lat).filter(([k,v])=>Number(v)<=2).sort((a,b)=>Number(a[1])-Number(b[1])).slice(0,3);
  if(weak.length){
    h+='<div style="margin:16px 0"><div style="font-weight:700;color:#1e40af;margin-bottom:8px">\uD83C\uDFAF Development Focus / مجالات التطوير</div>';
    weak.forEach(([sid,v])=>{const sk=SK[sid];if(!sk)return;const tgt=Math.min(Number(v)+1,5);
      h+='<div style="background:#eff6ff;border-radius:10px;padding:10px;margin-bottom:8px"><div style="font-weight:600;font-size:13px">'+sk.n+' \u2014 '+sk.a+'</div><div style="display:flex;align-items:center;gap:8px;margin-top:4px"><span style="color:#dc2626;font-weight:800;font-size:16px">'+v+'</span><span>\u2192</span><span style="color:#059669;font-weight:800;font-size:16px">'+tgt+'</span><span style="font-size:11px;color:var(--t2)">target</span></div></div>'});
    h+='</div>';
  }

  // Home activities (interactive checklist)
  if(recs.parent.length){
    h+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:16px;margin:16px 0"><div style="font-weight:700;color:#c2410c;margin-bottom:10px">\uD83C\uDFE0 This Week at Home / هذا الأسبوع في المنزل</div>';
    recs.parent.forEach((r,i)=>{
      h+='<div class="chk" id="ha'+i+'" onclick="this.classList.toggle(\'done\')"><span style="font-size:18px">\u2705</span><div><div style="font-weight:600;font-size:12px">'+r.skill+' \u2014 '+r.skillAr+'</div><div style="font-size:11px;color:#7c2d12">'+r.en+'</div><div style="font-size:11px;color:#9a3412;direction:rtl;text-align:right">'+r.ar+'</div></div></div>';
    });
    h+='</div>';
  }

  // Parent message
  h+='<div style="background:#fdf4ff;border:1px solid #e9d5ff;border-radius:12px;padding:16px;margin:16px 0"><div style="font-weight:700;color:#7c3aed;margin-bottom:8px">\uD83D\uDCAC Dear Parent / عزيزي ولي الأمر</div><p style="font-size:13px;color:#4c1d95;line-height:1.6;margin:0">Your child is on a journey. The numbers are not grades \u2014 they are a map. Your encouragement at home is just as important as our coaching.</p></div>';

  h+='<div style="text-align:center;padding:20px;font-size:11px;color:var(--t3)">HOST Academy v2.0 \u00B7 Powered by AI</div>';
  return h+'</div>';
}

function genWA(pid){
  const p=S.d.players.find(x=>x.id===pid);const st2=stats(pid);if(!p||!st2)return;
  let t="\uD83C\uDFC0 *HOST Academy Report*\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n*"+p.name+"*\nAge: "+p.age+" | Sessions: "+st2.sessions+" | Overall: "+st2.overall.toFixed(1)+"/5\n";
  RCATS.forEach(cat=>{const cd=st2.byCat[cat.id];if(!cd||cd.avg===0)return;t+="\n"+cat.ic+" *"+cat.nm+":* "+cd.avg.toFixed(1)+"/5\n";cat.sk.forEach(sid=>{const sd=st2.bySk[sid];if(!sd)return;t+="  "+SK[sid].n+": "+sd.avg.toFixed(1)+"\n"})});
  t+="\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n_HOST Academy v2.0_";
  document.getElementById("war").innerHTML='<div class="cd" style="margin-top:12px"><div class="ch">Copy & Send</div><div class="cb"><pre id="wat" style="white-space:pre-wrap;font-size:12px">'+t+'</pre><button class="bg bf" style="margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById(\'wat\').textContent).then(()=>toast(\'Copied!\'))">\uD83D\uDCCB Copy</button></div></div>';
}

function vAM(){
  let h='<h2 class="tl">Messages</h2><div class="cd"><div class="cb"><textarea class="fi" id="mt" placeholder="Message for parents & kids..."></textarea><button class="bp bf" style="margin-top:8px" onclick="sendMsg()">\uD83D\uDCE2 Send</button></div></div>';
  S.d.messages.forEach(m=>{
    const ic=m.type==="parent_checkin"?"\uD83D\uDCDD":m.type==="parent_feedback"?"\u2B50":m.type==="kid_rating"?"\uD83C\uDFC0":"\uD83D\uDCE2";
    const bg=m.type==="parent_checkin"?"#fef3c7":m.type==="parent_feedback"?"#ede9fe":m.type==="kid_rating"?"#ecfeff":"#fff";
    const bc=m.type==="parent_checkin"?"#d97706":m.type==="parent_feedback"?"#7c3aed":m.type==="kid_rating"?"#0891b2":"var(--b)";
    h+='<div class="cd" style="border-left:3px solid '+bc+'"><div class="cb" style="background:'+bg+'"><div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--t3)">'+fd(m.date)+'</span><span style="font-size:10px;font-weight:600">'+ic+'</span></div><div style="font-size:11px;font-weight:600;margin-top:2px">'+(m.from_name||"HOST")+'</div><div style="font-size:13px;margin-top:4px">'+m.text+'</div></div></div>'});
  return h;
}

async function sendMsg(){
  const t=document.getElementById("mt").value.trim();if(!t){toast("Write a message");return}
  if(await post({action:"sendMessage",message:{id:gid(),date:new Date().toISOString(),from_name:"HOST Academy",text:t,type:"announcement"}})){toast("Sent!");R()}
}

function vAD(){
  const d=S.d;
  let h='<h2 class="tl">Data</h2><div class="cd"><div class="cb"><div class="ib" style="margin-bottom:12px">\uD83D\uDC65 '+d.players.length+' \u00B7 \uD83D\uDCCB '+d.sessions.length+' \u00B7 \uD83D\uDCCA '+d.evaluations.length+' \u00B7 \uD83D\uDCE2 '+d.messages.length+'</div>';
  h+='<button class="bp bf" style="margin-bottom:8px" onclick="expD()">\uD83D\uDCE5 Export JSON</button>';
  h+='<button class="bf" style="background:none;border:1px solid var(--b);color:var(--b);border-radius:8px;padding:10px;font-size:14px" onclick="api().then(()=>{R();toast(\'Refreshed\')})">\uD83D\uDD04 Refresh</button></div></div>';
  if(d.players.length){
    h+='<div class="cd"><div class="ch">PINs</div><div class="cb"><div style="font-size:12px;color:var(--t2);margin-bottom:8px">Coach PIN: <b style="font-family:monospace;font-size:14px">'+PIN_COACH+'</b> | Admin PIN: <b style="font-family:monospace;font-size:14px">'+PIN_ADMIN+'</b></div>';
    d.players.forEach(p=>{h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:14px"><span>'+p.name+'</span><span style="font-weight:700;font-family:monospace;font-size:16px">'+p.parent_pin+'</span></div>'});
    h+='</div></div>';
  }
  return h;
}

function expD(){
  const b=new Blob([JSON.stringify(S.d,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="host-academy-"+new Date().toISOString().slice(0,10)+".json";a.click();toast("Exported");
}

// ═══ INIT ═══
api().then(R);
</script>
