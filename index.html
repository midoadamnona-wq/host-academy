*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a56a8;--d:#0c1425;--g:#0d9668;--o:#d97706;--r:#dc2626;--bg:#f1f4f9;--c:#fff;--br:#dfe4ec;--t:#1e293b;--t2:#64748b;--t3:#94a3b8;--rd:8px;--sh:0 2px 8px rgba(0,0,0,.06)}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--t);max-width:480px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit;font-size:14px}
#TT{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--d);color:#fff;padding:10px 28px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;display:none;box-shadow:0 8px 24px rgba(0,0,0,.3)}
#LL{position:fixed;inset:0;background:rgba(12,20,37,.85);display:none;align-items:center;justify-content:center;z-index:998;backdrop-filter:blur(4px)}
#LL.s{display:flex}
#LL div{color:#fff;font-size:15px;font-weight:600}
.hd{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.hd h2{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hd small{font-size:10px;opacity:.5;display:block;margin-top:1px}
.hb{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.8);border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600}
.nv{display:flex;background:var(--c);border-bottom:1px solid var(--br)}
.nv button{flex:1;padding:9px 2px;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--t3);font-size:10px;font-weight:500;border-bottom:2px solid transparent;transition:all .2s}
.nv button.a{font-weight:700;color:var(--p);border-bottom-color:var(--p)}
.ct{padding:16px;padding-bottom:90px}
.tl{font-size:18px;font-weight:800;margin:0 0 14px;letter-spacing:-.3px}
.cd{background:var(--c);border-radius:10px;border:1px solid var(--br);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.ch{padding:9px 14px;font-weight:700;font-size:11px;border-bottom:1px solid var(--br);letter-spacing:.5px;color:var(--t2);background:#f8fafc;text-transform:uppercase}
.cb{padding:14px}
.fg{margin-bottom:10px}
.fl{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--t2)}
.fi{width:100%;padding:10px 12px;border:1px solid var(--br);border-radius:var(--rd);font-size:14px;background:var(--c);color:var(--t);outline:none;transition:border .2s}
.fi:focus{border-color:var(--p)}
textarea.fi{min-height:50px;resize:vertical}
.btn{border:none;border-radius:var(--rd);padding:10px 20px;font-size:14px;font-weight:700;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--p);color:#fff}.bg{background:var(--g);color:#fff}.bo{background:var(--o);color:#fff}.br{background:var(--r);color:#fff}
.bs{background:transparent;color:var(--t);border:1px solid var(--br)}
.bf{width:100%}.bl{padding:14px;font-size:15px}
.av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.ib{background:#eef2f7;border-radius:var(--rd);padding:10px 14px;font-size:13px;color:var(--t2)}
.pb{height:6px;background:#e8ecf1;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s}
.rt{display:flex;gap:4px}
.rt button{width:32px;height:32px;border-radius:var(--rd);border:2px solid var(--br);background:transparent;font-weight:700;font-size:13px;color:var(--t3);transition:all .15s}
.lb{display:block;width:100%;padding:9px 14px;border:1px solid var(--br);border-radius:var(--rd);background:transparent;text-align:left;font-size:13px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.lb.s{border-color:var(--p);background:#eff6ff;color:var(--p);font-weight:700}
.dt{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:10px}
.dt button{width:28px;height:28px;border-radius:50%;border:2px solid var(--br);background:var(--c);font-weight:700;font-size:10px;color:var(--t2)}
.dt button.c{border-color:var(--p);background:var(--p);color:#fff}
.dt button.d{border-color:var(--g);background:#ecfdf5;color:var(--g)}
.lg{display:flex;align-items:center;gap:14px;width:100%;max-width:340px;padding:16px 20px;border:none;border-radius:14px;color:#fff;text-align:left;margin-bottom:10px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.25);transition:transform .15s}
.lg:active{transform:scale(.97)}
.lg small{display:block;font-size:11px;font-weight:400;opacity:.7;margin-top:2px}
.warn{background:#fef9e7;border:1.5px solid #f5c518;border-radius:var(--rd);padding:14px;margin-bottom:10px}
.chk{display:flex;align-items:flex-start;gap:10px;padding:10px;background:#f8fafc;border:1px solid var(--br);border-radius:var(--rd);margin-bottom:6px;cursor:pointer;font-size:13px;transition:all .2s}
.chk:active{background:#ecfdf5}.chk.done{background:#ecfdf5;border-color:#a7f3d0;opacity:.6}
.hid{display:none}
.seg{display:flex;gap:3px}.seg div{flex:1;height:6px;border-radius:3px}
.mood{display:flex;gap:8px;justify-content:center}
.mood button{width:64px;height:64px;border-radius:16px;border:2px solid var(--br);background:var(--c);font-size:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s}
.mood button.s{border-color:var(--p);background:#eff6ff;transform:scale(1.05)}
.mood button span{font-size:9px;color:var(--t2);font-weight:600}
.stars{display:flex;gap:6px}.stars button{font-size:28px;background:none;border:none;opacity:.3;transition:all .15s}.stars button.on{opacity:1;transform:scale(1.1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cd{animation:fadeIn .3s ease}
</style>
</head>

if(d.outcomes)d.outcomes.forEach(function(a){if(!DEF_OUTCOMES.find(function(x){return x.id===a.id}))DEF_OUTCOMES.push(a)});

apiPost({action:"sendMessage",message:{id:old?old.id:gid(),date:new Date().toISOString(),from_name:"System",text:"CUSTOM_OPTS:"+JSON.stringify(customs),type:"custom_opts"}})

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fd(d){try{return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}catch(e){return"?"}}

function stats(pid){
var ev=S.d.evaluations.filter(function(e){return e.player_id===pid&&e.attended});
if(!ev.length)return null;

var byCat={};
RCATS.forEach(function(cat){
var vals=ev.map(function(e){var v=cat.sk.map(function(s){return Number(e.skills[s])||0}).filter(function(x){return x>0});return v.length?av(v):0}).filter(function(x){return x>0});
byCat[cat.id]={avg:av(vals),trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0}});
var bySk={};
RCATS.forEach(function(cat){cat.sk.forEach(function(sid){
var vals=ev.map(function(e){return Number(e.skills[sid])||0}).filter(function(x){return x>0});
if(vals.length)bySk[sid]={avg:av(vals),lat:vals[vals.length-1],prev:vals.length>=2?vals[vals.length-2]:0,trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0}})});
var overall=av(Object.values(byCat).map(function(c){return c.avg}).filter(function(x){return x>0}));

var att=allEv.length?(allEv.filter(function(e){return e.attended}).length/allEv.length*100):0;
return{sessions:ev.length,byCat:byCat,bySk:bySk,overall:overall,att:att,latest:lat,prev:prev}
}

function vDashboard() {
  var h = '';
  var players = S.d.players.filter(function(p) { return p.active !== false });
  var now = new Date();
  
  // ═══ ACADEMY HEALTH SCORES ═══
  h += '<h2 class="tl">Academy Health Dashboard</h2>';
  if (S.examMode) {
    h += '<div style="background:#fef3c7;border:1px solid #fbbf24;border-radius:var(--rd);padding:8px 12px;margin-bottom:10px;font-size:12px;color:#92400e;font-weight:600">Exam Period Active — attendance metrics adjusted. Low-attendance players shown as \"On Hold.\" Turn off in Data tab when exams end.</div>';
  }
  
  // Calculate key metrics
  var totalImproved = 0, totalDeclined = 0, totalStable = 0;
  var overallScores = [];
  players.forEach(function(p) {
    var st = stats(p.id);
    if (!st || !st.prev) return;
    var curr = st.overall;
    var prev = st.prevOverall || 0;
    overallScores.push(curr);
    if (S.examMode && st.att < 50) { totalStable++; } // Exam hold — don't count as declined
    else if (curr > prev + 0.1) totalImproved++;
    else if (curr < prev - 0.1) totalDeclined++;
    else totalStable++;
  });
  var avgScore = overallScores.length ? (overallScores.reduce(function(a,b){return a+b},0) / overallScores.length) : 0;
  
  // Parent engagement this week
  var weekStart = new Date(now); weekStart.setDate(now.getDate() - 7);
  var parentCheckins = S.d.messages.filter(function(m) { return m.type === "parent_checkin" && m.date && new Date(m.date) >= weekStart }).length;
  var uniqueParents = {};
  S.d.messages.filter(function(m) { return m.type === "parent_checkin" && m.date && new Date(m.date) >= weekStart }).forEach(function(m) { uniqueParents[m.from_name] = true });
  var parentRate = players.length ? Math.round(Object.keys(uniqueParents).length / players.length * 100) : 0;
  
  // Attendance last session
  var lastSess = S.d.sessions.length ? S.d.sessions[S.d.sessions.length - 1] : null;
  var lastAtt = 0;
  if (lastSess) {
    var attCount = S.d.evaluations.filter(function(e) { return e.session_id === lastSess.id && e.attended }).length;
    lastAtt = Math.round(attCount / players.length * 100);
  }
  
  // KPI stats
  var kpiSt = getKPIStats();
  
  // Top row — big numbers
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  h += '<div style="background:linear-gradient(135deg,#059669,#10b981);border-radius:var(--rd);padding:14px;color:#fff;text-align:center"><div style="font-size:28px;font-weight:900">' + totalImproved + '/' + players.length + '</div><div style="font-size:10px;opacity:.7">Players improved</div></div>';
  h += '<div style="background:linear-gradient(135deg,#2563eb,#3b82f6);border-radius:var(--rd);padding:14px;color:#fff;text-align:center"><div style="font-size:28px;font-weight:900">' + parentRate + '%</div><div style="font-size:10px;opacity:.7">Parent engagement</div></div>';
  h += '<div style="background:linear-gradient(135deg,#7c3aed,#8b5cf6);border-radius:var(--rd);padding:14px;color:#fff;text-align:center"><div style="font-size:28px;font-weight:900">' + lastAtt + '%</div><div style="font-size:10px;opacity:.7">Last session attendance</div></div>';
  h += '<div style="background:linear-gradient(135deg,#e8732c,#f59e0b);border-radius:var(--rd);padding:14px;color:#fff;text-align:center"><div style="font-size:28px;font-weight:900">' + kpiSt.hitRate + '%</div><div style="font-size:10px;opacity:.7">KPI hit rate (' + kpiSt.hit + '/' + (kpiSt.total || 1) + ')</div></div>';
  h += '</div>';
  
  // Academy average trend
  h += '<div class="cd"><div class="ch">Academy Average: ' + avgScore.toFixed(1) + '/5</div><div class="cb" style="font-size:12px;color:var(--t2)">';
  h += totalImproved + ' improved, ' + totalStable + ' stable, ' + totalDeclined + ' declined since last session.';
  h += '</div></div>';
  
  // ═══ CHURN RISK ═══
  h += '<div class="cd" style="border-left:3px solid var(--r)"><div class="ch" style="color:var(--r)">Churn Risk — Families to Watch</div><div class="cb">';
  
  var risks = [];
  players.forEach(function(p) {
    var st = stats(p.id);
    var riskScore = 0;
    var reasons = [];
    
    // Attendance declining (skip if exam mode)
    if (!S.examMode) {
      if (st && st.att < 50) { riskScore += 3; reasons.push("Attendance below 50%"); }
      else if (st && st.att < 75) { riskScore += 1; reasons.push("Attendance below 75%"); }
    }
    
    // Parent engagement
    var parentMsgs = S.d.messages.filter(function(m) { return m.type === "parent_checkin" && String(m.from_name).indexOf(p.name) >= 0 });
    var recentParent = parentMsgs.filter(function(m) { return m.date && new Date(m.date) >= weekStart });
    if (parentMsgs.length === 0) { riskScore += 2; reasons.push("Parent never submitted check-in"); }
    else if (recentParent.length === 0) { riskScore += 1; reasons.push("No parent check-in this week"); }
    
    // Kid rating
    var kidRatings = S.d.messages.filter(function(m) { return m.type === "kid_rating" && String(m.from_name).indexOf(p.name) >= 0 });
    if (kidRatings.length) {
      var lastRating = kidRatings[kidRatings.length - 1];
      var funM = String(lastRating.text).match(/Fun:(\d)/);
      if (funM && Number(funM[1]) <= 2) { riskScore += 2; reasons.push("Kid rated fun " + funM[1] + "/5"); }
    }
    
    // Score declining
    if (st && st.prev && st.overall < st.prevOverall - 0.3) { riskScore += 1; reasons.push("Score declining"); }
    
    if (riskScore >= 2) {
      var level = riskScore >= 4 ? "HIGH" : riskScore >= 3 ? "MEDIUM" : "LOW";
      var color = riskScore >= 4 ? "var(--r)" : riskScore >= 3 ? "var(--o)" : "#a16207";
      risks.push({name: p.name, score: riskScore, level: level, color: color, reasons: reasons});
    }
  });
  
  risks.sort(function(a,b) { return b.score - a.score });
  
  if (risks.length === 0) {
    h += '<div style="text-align:center;padding:10px;color:var(--g)">No families at risk this week</div>';
  } else {
    risks.forEach(function(r) {
      h += '<div style="padding:8px;margin-bottom:6px;background:rgba(220,38,38,.05);border-radius:8px;border-left:3px solid ' + r.color + '">';
      h += '<div style="display:flex;justify-content:space-between"><span style="font-weight:700;font-size:12px">' + r.name + '</span><span style="font-size:10px;font-weight:700;color:' + r.color + '">' + r.level + ' RISK</span></div>';
      h += '<div style="font-size:10px;color:var(--t3);margin-top:2px">' + r.reasons.join(" | ") + '</div>';
      h += '</div>';
    });
  }
  h += '</div></div>';
  
  // ═══ TOP IMPROVERS ═══
  h += '<div class="cd"><div class="ch" style="color:var(--g)">Top Improvers</div><div class="cb">';
  var improvers = [];
  players.forEach(function(p) {
    var st = stats(p.id);
    if (!st || !st.prev) return;
    var diff = st.overall - (st.prevOverall || 0);
    if (diff > 0) improvers.push({name: p.name, diff: diff, score: st.overall});
  });
  improvers.sort(function(a,b) { return b.diff - a.diff });
  if (improvers.length === 0) {
    h += '<div style="padding:10px;font-size:12px;color:var(--t3)">Need 2+ sessions for comparison data</div>';
  } else {
    improvers.slice(0, 5).forEach(function(imp) {
      h += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--bd)">';
      h += '<span style="font-weight:600">' + imp.name + '</span>';
      h += '<span style="color:var(--g);font-weight:700">+' + imp.diff.toFixed(1) + ' (' + imp.score.toFixed(1) + ')</span></div>';
    });
  }
  h += '</div></div>';

// ═══ KPI & SESSION PREP ENGINE ═══
function genKPIs(ch) {
  // Auto-generate 3 priority KPIs per child from latest evaluation
  var chEvals = S.d.evaluations.filter(function(e) { return e.player_id === ch.id && e.attended });
  if (!chEvals.length) return [];
  var lastEval = chEvals[chEvals.length - 1];
  var skills = lastEval.skills || {};
  
  // Get all skills with scores, sorted weakest first
  var scored = [];
  Object.keys(skills).forEach(function(sid) {
    var v = Number(skills[sid]);
    if (v > 0 && v < 5 && SK[sid]) {
      scored.push({ sid: sid, name: SK[sid].n, nameAr: SK[sid].a, level: v, target: Math.min(v + 1, 5) });
    }
  });
  // Skill-type awareness: categorize each skill
  var techSids = ["ball_handling","shooting","passing","layups","defense"];
  var athSids = ["speed_agility","coordination","endurance"];
  var iqSids = ["court_awareness","decision_making"];
  var chrSids = ["effort","teamwork","sportsmanship","coachability","leadership"];
  
  scored.forEach(function(s) {
    if (techSids.indexOf(s.sid) >= 0) s.cat = "tech";
    else if (athSids.indexOf(s.sid) >= 0) s.cat = "ath";
    else if (iqSids.indexOf(s.sid) >= 0) s.cat = "iq";
    else if (chrSids.indexOf(s.sid) >= 0) s.cat = "chr";
    else s.cat = "tech";
  });
  
  // Check if child has Technical Level 3+ across the board
  var techAvg = 0, techCount = 0;
  scored.forEach(function(s) { if (s.cat === "tech") { techAvg += s.level; techCount++; } });
  techAvg = techCount ? techAvg / techCount : 0;
  
  // Priority: Technical(up to 2) → Character(up to 1) → Athletic → IQ(only if tech avg >= 3)
  var selected = [];
  var weakTech = scored.filter(function(s) { return s.cat === "tech" }).sort(function(a,b) { return a.level - b.level });
  var weakChr = scored.filter(function(s) { return s.cat === "chr" }).sort(function(a,b) { return a.level - b.level });
  var weakAth = scored.filter(function(s) { return s.cat === "ath" }).sort(function(a,b) { return a.level - b.level });
  var weakIq = scored.filter(function(s) { return s.cat === "iq" && techAvg >= 3 }).sort(function(a,b) { return a.level - b.level });
  
  // Pick up to 2 technical
  weakTech.slice(0, 2).forEach(function(s) { if (selected.length < 3) selected.push(s) });
  // Pick up to 1 character
  weakChr.slice(0, 1).forEach(function(s) { if (selected.length < 3) selected.push(s) });
  // Fill remaining from athletic
  weakAth.forEach(function(s) { if (selected.length < 3) selected.push(s) });
  // IQ only if tech is strong enough
  weakIq.forEach(function(s) { if (selected.length < 3) selected.push(s) });
  // If still not 3, add any remaining
  scored.forEach(function(s) { if (selected.length < 3 && selected.indexOf(s) < 0) selected.push(s) });
  
  var kpis = selected.slice(0, 3).map(function(s) {
    var info = SKILL_INFO[s.name] ? SKILL_INFO[s.name][s.level] : null;
    var nextInfo = SKILL_INFO[s.name] ? SKILL_INFO[s.name][s.target] : null;
    
    // Determine best approach for this child from historical data
    var approachData = getBestApproach(ch.id);
    
    return {
      skill: s.name,
      skillAr: s.nameAr,
      current: s.level,
      target: s.target,
      timeline: info ? info.time : "4-6 weeks",
      currentDesc: info ? info.desc : "",
      targetDesc: nextInfo ? nextInfo.desc : "",
      homeActivity: info ? info.home : "",
      coachAction: getCoachAction(s.name, s.level),
      approachData: approachData,
      parentAction: getParentAction(s.name, s.level),
      kidAction: getKidAction(s.name, s.level)
    };
  });
  return kpis;
}

function getBestApproach(pid) {
  var msgs = S.d.messages.filter(function(m) { return m.type === "evaluation_meta" && String(m.text).indexOf(pid) >= 0 });
  var approaches = {};
  msgs.forEach(function(m) {
    var match = String(m.text).match(/approach:([^|]+)/);
    if (match) {
      var a = match[1].trim();
      approaches[a] = (approaches[a] || 0) + 1;
    }
  });
  var totalSessions = Object.values(approaches).reduce(function(s, n) { return s + n; }, 0);
  if (totalSessions < 3) return { approach: null, confidence: "low", samples: totalSessions };
  var best = null, max = 0;
  Object.keys(approaches).forEach(function(a) { if (approaches[a] > max) { max = approaches[a]; best = a; } });
  return { approach: best, confidence: max >= 5 ? "high" : "medium", samples: totalSessions };
}

function getHealthAlerts() {
  // Get parent check-ins from this week
  var now = new Date();
  var weekStart = new Date(now);
  weekStart.setDate(now.getDate() - 7);
  
  var alerts = [];
  S.d.messages.forEach(function(m) {
    if (m.type !== "parent_checkin" || !m.date) return;
    var d = new Date(m.date);
    if (d < weekStart) return;
    
    var txt = String(m.text);
    var name = String(m.from_name).replace(" (Parent)", "");
    
    // Parse check-in values
    var sleep = txt.match(/Sleep:(\d)/);
    var mood = txt.match(/Mood:(\d)/);
    var health = txt.match(/Health:(\d)/);
    var nutrition = txt.match(/Nutrition:(\d)/);
    var homeAct = txt.match(/HomeActivity:(\d)/);
    
    var playerAlerts = [];
    if (sleep && Number(sleep[1]) <= 2) playerAlerts.push({type: "sleep", val: sleep[1], msg: "Poor sleep (" + sleep[1] + "/5) — expect low energy. Start with fun games, reduce intensity."});
    if (mood && Number(mood[1]) <= 2) playerAlerts.push({type: "mood", val: mood[1], msg: "Low mood (" + mood[1] + "/5) — needs encouragement. Extra positive attention today."});
    if (health && Number(health[1]) <= 2) playerAlerts.push({type: "health", val: health[1], msg: "Health concern (" + health[1] + "/5) — monitor closely. Light participation if needed."});
    if (nutrition && Number(nutrition[1]) <= 2) playerAlerts.push({type: "nutrition", val: nutrition[1], msg: "Poor nutrition (" + nutrition[1] + "/5) — may fatigue faster. Shorter drill rotations."});
    if (homeAct && Number(homeAct[1]) <= 1) playerAlerts.push({type: "home", val: homeAct[1], msg: "No home practice — motivation may be low. Re-engage with fun challenge."});
    
    if (playerAlerts.length) {
      alerts.push({ name: name, date: d, alerts: playerAlerts });
    }
  });
  return alerts;
}

function getCharacterInterventions(players) {
  var interventions = [];
  players.forEach(function(ch) {
    var chEvals = S.d.evaluations.filter(function(e) { return e.player_id === ch.id && e.attended });
    if (chEvals.length < 2) return;

          skill: sn,
          from: p, to: curr,

        from: 0, to: 0,

}

// ═══ KPI PERSISTENCE & CLOSE-THE-LOOP ═══
function getActiveKPIs(childId) {
  var all = getAllKPIs(childId);
  var unique = {};
  all.forEach(function(k) {
    var key = (k.skill||'') + '|' + (k.generatedDate||'');
    var existing = unique[key];
    if (!existing || (k.resolvedDate && (!existing.resolvedDate || k.resolvedDate > existing.resolvedDate))) {
      unique[key] = k;
    } else if (!existing.resolvedDate && k.status !== 'active') {
      unique[key] = k;
    }
  });
  return Object.values(unique).filter(function(k) { return k.status === 'active' });
}

function getAllKPIs(childId) {
  return S.d.messages.filter(function(m) {
    return m.type === "kpi" && String(m.text).indexOf('"child":"' + childId + '"') >= 0;
  }).map(function(m) { try { return JSON.parse(m.text); } catch(e) { return null; } }).filter(Boolean);
}

function saveKPIs(childId, kpis) {
  // Only save new KPIs if fewer than 3 active exist
  // Uses deduped active count to avoid phantom actives
  var existingAll = S.d.messages.filter(function(m) {
    return m.type === "kpi" && String(m.text).indexOf('"child":"' + childId + '"') >= 0;
  }).map(function(m) { try { return JSON.parse(m.text); } catch(e) { return null; } }).filter(Boolean);
  var uniqueActive = {};
  existingAll.forEach(function(k) {
    var key = (k.skill||"") + "|" + (k.generatedDate||"");
    var ex = uniqueActive[key];
    if (!ex || (k.resolvedDate && (!ex.resolvedDate || k.resolvedDate > ex.resolvedDate))) uniqueActive[key] = k;
    else if (!ex.resolvedDate && k.status !== "active") uniqueActive[key] = k;
  });
  var activeCount = Object.values(uniqueActive).filter(function(k) { return k.status === "active" }).length;
  if (activeCount >= 3) return; // Already has 3+ active KPIs
  
  kpis.forEach(function(kpi) {
    // Parse timeline to estimate weeks
    var weeks = 6; // default — generous to avoid false misses
    var tm = (kpi.timeline || "").match(/(\d+)\s*-?\s*(\d+)?/);
    if (tm) weeks = tm[2] ? parseInt(tm[2]) : parseInt(tm[1]);
    weeks += 2; // grace buffer — KPIs should err toward giving kids the full window
    var targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + weeks * 7);
    
    var kpiData = {
      child: childId,
      skill: kpi.skill,
      current: kpi.current,
      target: kpi.target,
      targetDate: targetDate.toISOString(),
      generatedDate: new Date().toISOString(),
      status: "active"
    };
    
    apiPost({action: "sendMessage", message: {
      id: gid(), date: new Date().toISOString(),
      from_name: "System", text: JSON.stringify(kpiData), type: "kpi"
    }});
  });
}

function checkKPIs(childId, currentSkills) {
  // Called after each evaluation — check if active KPIs were hit
  var active = getActiveKPIs(childId);
  var now = new Date();
  
  active.forEach(function(kpi) {
    var currentLevel = 0;
    // Find the skill ID for this skill name
    Object.keys(SK).forEach(function(sid) {
      if (SK[sid].n === kpi.skill) currentLevel = Number(currentSkills[sid] || 0);
    });
    
    var newStatus = kpi.status;
    if (currentLevel >= kpi.target) {
      newStatus = "hit";
    } else if (now > new Date(kpi.targetDate)) {
      newStatus = "missed";
    } else if (currentLevel > kpi.current) {
      newStatus = "in_progress";
    }
    
    if (newStatus !== kpi.status) {
      // Update KPI status
      var updated = JSON.parse(JSON.stringify(kpi));
      updated.status = newStatus;
      updated.resolvedDate = new Date().toISOString();
      updated.resolvedLevel = currentLevel;
      apiPost({action: "sendMessage", message: {
        id: gid(), date: new Date().toISOString(),
        from_name: "System", text: JSON.stringify(updated), type: "kpi"
      }});
    }
  });
}

function getKPIStats() {
  var all = S.d.messages.filter(function(m) { return m.type === "kpi" }).map(function(m) {
    try { return JSON.parse(m.text); } catch(e) { return null; }
  }).filter(Boolean);
  
  // Dedupe by child+skill+generatedDate — use latest status only
  var unique = {};
  all.forEach(function(k) {
    var key = (k.child||"") + "|" + (k.skill||"") + "|" + (k.generatedDate||"");
    var existing = unique[key];
    if (!existing || (k.resolvedDate && (!existing.resolvedDate || k.resolvedDate > existing.resolvedDate))) {
      unique[key] = k;
    } else if (!existing.resolvedDate && k.status !== "active") {
      unique[key] = k;
    }
  });
  var deduped = Object.values(unique);
  
  var hit = deduped.filter(function(k) { return k.status === "hit" }).length;
  var missed = deduped.filter(function(k) { return k.status === "missed" }).length;
  var active = deduped.filter(function(k) { return k.status === "active" }).length;
  var inProgress = deduped.filter(function(k) { return k.status === "in_progress" }).length;
  var total = hit + missed;
  var hitRate = total > 0 ? Math.round(hit / total * 100) : 0;
  
  return { hit: hit, missed: missed, active: active, inProgress: inProgress, total: total, hitRate: hitRate };
}

function vSessionPrep() {
  var h = "";
  var today = new Date();
  var dayOfWeek = today.getDay(); // 0=Sun, 5=Fri
  var isThursday = dayOfWeek === 4;
  var isFriday = dayOfWeek === 5;
  var isSessionDay = isFriday;
  
  var briefType = isSessionDay ? "Game Day Brief" : "Pre-Session Planning";
  
  h += '<div style="text-align:center;margin-bottom:14px"><div style="font-size:36px">\uD83D\uDCCB</div>';
  h += '<h3 style="margin:6px 0;font-size:16px">' + briefType + '</h3>';
  h += '<p style="font-size:11px;color:var(--t2)">Auto-generated from parent check-ins, evaluations, and AI insights</p></div>';
  
  var players = S.d.players.filter(function(p) { return p.active !== false });
  
  // ═══ SECTION 1: HEALTH ALERTS ═══
  var alerts = getHealthAlerts();
  if (alerts.length) {
    h += '<div class="cd" style="border-left:3px solid var(--r)"><div class="ch" style="color:var(--r)">\u26A0\uFE0F Health & Readiness Alerts</div><div class="cb">';
    alerts.forEach(function(a) {
      h += '<div style="margin-bottom:10px;padding:8px;background:rgba(220,38,38,.08);border-radius:8px">';
      h += '<div style="font-weight:700;font-size:13px;color:var(--r)">' + a.name + '</div>';
      a.alerts.forEach(function(al) {
        h += '<div style="font-size:11px;color:var(--t2);margin-top:3px;padding-left:8px;border-left:2px solid ' + (al.type === "health" ? "var(--r)" : "var(--o)") + '">\u2022 ' + al.msg + '</div>';
      });
      h += '</div>';
    });
    h += '</div></div>';
  } else {
    h += '<div style="background:#ecfdf5;border-radius:var(--rd);padding:10px;text-align:center;margin-bottom:10px;font-size:12px;color:#047857">\u2705 No health alerts — all check-ins normal</div>';
  }
  
  // ═══ SECTION 2: PLAYER KPIs & COACHING PLAN ═══
  h += '<div class="cd"><div class="ch">\uD83C\uDFAF Player KPIs & Session Plan</div><div class="cb">';
  
  players.forEach(function(ch) {
    var kpis = genKPIs(ch);
    if (!kpis.length) return;
    // Auto-persist KPIs if none active for this child
    saveKPIs(ch.id, kpis);
    
    h += '<div style="margin-bottom:14px;border:1px solid var(--bd);border-radius:var(--rd);overflow:hidden">';
    h += '<div style="background:var(--bg2);padding:8px 12px;display:flex;justify-content:space-between;align-items:center">';
    h += '<span style="font-weight:700;font-size:13px">' + ch.name + '</span>';
    h += '<span style="font-size:10px;color:var(--t3)">Age ' + (ch.age || "?") + '</span></div>';
    
    kpis.forEach(function(kpi, idx) {
      var bgColor = idx === 0 ? "rgba(232,115,44,.06)" : "transparent";
      h += '<div style="padding:8px 12px;background:' + bgColor + ';border-top:1px solid var(--bd)">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
      h += '<span style="font-weight:600;font-size:12px;color:' + rc(kpi.current) + '">' + kpi.skill + '</span>';
      h += '<span style="font-size:11px"><span style="color:' + rc(kpi.current) + ';font-weight:700">' + kpi.current + '</span>\u2192<span style="color:' + rc(kpi.target) + ';font-weight:700">' + kpi.target + '</span></span>';
      h += '</div>';
      
      // Coach action
      var appTxt = "";
      if (kpi.approachData && kpi.approachData.approach) {
        if (kpi.approachData.confidence === "high") appTxt = " (recommended: " + kpi.approachData.approach + ")";
        else appTxt = " (suggested: " + kpi.approachData.approach + " — " + kpi.approachData.samples + " sessions)";
      } else { appTxt = " (no data yet — use your judgment)"; }
      h += '<div style="font-size:10px;color:var(--t2);margin-bottom:2px">\uD83C\uDFC0 <b>Coach:</b> ' + kpi.coachAction + appTxt + '</div>';
      
      // Parent status
      h += '<div style="font-size:10px;color:var(--t3)">\uD83C\uDFE0 <b>Home:</b> ' + kpi.homeActivity.substring(0, 80) + '...</div>';
      
      // Timeline
      h += '<div style="font-size:9px;color:var(--t3);margin-top:2px">\u23F1 ' + kpi.timeline + '</div>';
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div></div>';
  
  // ═══ SECTION 3: CHARACTER INTERVENTIONS ═══
  var charInt = getCharacterInterventions(players);
  if (charInt.length) {
    h += '<div class="cd" style="border-left:3px solid #7c3aed"><div class="ch" style="color:#7c3aed">\u2B50 Character Development Actions</div><div class="cb">';
    charInt.forEach(function(ci) {
      var isOpp = ci.skill === "Leadership Opportunity";
      h += '<div style="padding:8px;margin-bottom:6px;background:' + (isOpp ? "rgba(5,150,105,.08)" : "rgba(124,58,237,.06)") + ';border-radius:8px">';
      h += '<div style="font-weight:700;font-size:12px;color:' + (isOpp ? "var(--g)" : "#7c3aed") + '">' + ci.player + ' — ' + ci.skill + (ci.from ? " (" + ci.from + "\u2192" + ci.to + ")" : "") + '</div>';
      h += '<div style="font-size:11px;color:var(--t2);margin-top:2px">' + ci.action + '</div>';
      h += '</div>';
    });
    h += '</div></div>';
  }
  
  // ═══ SECTION 4: PARENT ENGAGEMENT TRACKER ═══
  var eng = getParentEngagement();
  h += '<div class="cd"><div class="ch">\uD83D\uDC68\u200D\uD83D\uDC69\u200D\uD83D\uDC67 Parent Engagement</div><div class="cb">';
  var engArr = Object.entries(eng).sort(function(a,b) { return b[1].total - a[1].total });
  engArr.forEach(function(e) {
    var color = e[1].recent ? "var(--g)" : (e[1].total > 0 ? "var(--o)" : "var(--r)");
    var status = e[1].recent ? "\u2705 Active this week" : (e[1].total > 0 ? "\u26A0\uFE0F No check-in this week" : "\u274C Never submitted");
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--bd)">';
    h += '<span>' + e[0] + '</span>';
    h += '<span style="color:' + color + '">' + status + ' (' + e[1].total + ' total)</span></div>';
  });
  h += '</div></div>';
  
  // ═══ SECTION 5: APPROACH SUMMARY ═══
  h += '<div class="cd"><div class="ch">\uD83E\uDDE0 Approach Recommendations</div><div class="cb">';
  var approachGroups = {};
  players.forEach(function(ch) {
    var appData = getBestApproach(ch.id);
    var app = appData.approach || "no_data";
    if (!approachGroups[app]) approachGroups[app] = [];
    approachGroups[app].push(ch.name);
  });
  var noData = [];
  Object.keys(approachGroups).forEach(function(app) {
    if (app === "no_data") { noData = approachGroups[app]; return; }
    h += '<div style="margin-bottom:6px"><span style="font-weight:700;font-size:12px;color:var(--p)">' + app + ':</span> ';
    h += '<span style="font-size:11px;color:var(--t2)">' + approachGroups[app].join(", ") + '</span></div>';
  });
  if (noData.length) {
    h += '<div style="margin-bottom:6px"><span style="font-weight:700;font-size:12px;color:var(--t3)">Insufficient data:</span> ';
    h += '<span style="font-size:11px;color:var(--t3)">' + noData.join(", ") + ' (need 3+ sessions)</span></div>';
  }
  h += '<div style="font-size:10px;color:var(--t3);margin-top:6px;font-style:italic">Based on historical approach tracking. Minimum 3 tagged sessions required for a suggestion.</div>';
  h += '</div></div>';
  
  return h;
}

</script>
