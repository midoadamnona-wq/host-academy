ball_handling:{1:"Cannot dribble 5sec | لا يدربل 5 ثوان",2:"Stationary, dominant hand | ثابت يد واحدة",3:"Dribble through 5 cones, 0-1 losses | 5 أقماع بدون فقدان",4:"Both hands + crossover | يدين + كروس أوفر",5:"Under pressure + advanced moves | تحت ضغط + حركات متقدمة"},

speed_agility:{1:"Cannot complete T-test | لا يكمل الاختبار",2:"Very slow T-test | بطيء جداً",3:"Age-appropriate time | وقت مناسب لسنه",4:"Top 25% for age | أفضل 25%",5:"Top 10%, explosive | أفضل 10% انفجاري"},

court_awareness:{1:"Stands in one spot | يقف مكانه",2:"Follows ball only, 20-40% correct | يتبع الكرة 20-40%",3:"Finds spaces, 40-60% correct | يجد مساحات 40-60%",4:"Reads plays, 60-80% correct | يقرأ اللعب 60-80%",5:"Anticipates, 80%+ correct | يستبق 80%+"},

coachability:{1:"Ignores instructions | يتجاهل",2:"Listens, doesn't apply | يسمع لا يطبق",3:"Follows after 1-2 reps | يتبع بعد 1-2 تكرار",4:"Applies immediately | يطبق فوراً",5:"Self-corrects, asks questions | يصحح نفسه ويسأل"},

const PLANS=[
  {id:"bh",nm:"🏀 Ball Handling Day",life:"Persistence"},
  {id:"sh",nm:"🎯 Shooting Day",life:"Resilience"},
  {id:"pt",nm:"🤝 Passing & Teamwork",life:"Selflessness"},
  {id:"df",nm:"🛡️ Defense Day",life:"Hard Work"},
  {id:"gd",nm:"🏆 Game Day",life:"Grace in Win/Loss"},
  {id:"fn",nm:"🎉 Fun & Challenges",life:"Joy & Creativity"}
];

// ─── AUTO RECOMMENDATIONS ────────────
function getRecs(skills,name,age){
  const recs={coach:[],parent:[],child:[]};
  if(!skills||!Object.keys(skills).length)return recs;
  const sorted=Object.entries(skills).sort((a,b)=>Number(a[1])-Number(b[1]));
  const weakest=sorted.filter(([k,v])=>Number(v)<=2).slice(0,3);
  const strongest=sorted.filter(([k,v])=>Number(v)>=4);

  const homeActs={
    ball_handling:{en:"Dribble any ball 5 min daily — 2 min left hand, 2 min right, 1 min alternating",ar:"دريبل 5 دقائق — دقيقتين يسار، دقيقتين يمين، دقيقة تبديل"},
    shooting:{en:"Practice BEEF form without hoop — Balance, Eyes, Elbow, Follow-through, 3 min",ar:"تمرين شكل BEEF بدون حلقة 3 دقائق"},
    passing:{en:"Wall passing — 3 min chest pass, 3 min bounce pass",ar:"تمرير على الحائط — 3 دقائق صدر و3 أرضي"},
    layups:{en:"Practice 1-2 step footwork without ball, then add ball",ar:"تمرين خطوات 1-2 بدون كرة ثم أضف الكرة"},
    defense:{en:"Mirror drill with family member — shadow movements 2 min",ar:"تمرين المرآة مع فرد من العائلة دقيقتين"},
    speed_agility:{en:"Running games — chase, tag, racing with siblings 15 min",ar:"ألعاب جري — مطاردة وسباق 15 دقيقة"},
    coordination:{en:"Jump rope 3 min + balance on one foot 30 sec each leg",ar:"نط حبل 3 دقائق + توازن 30 ثانية كل رجل"},
    endurance:{en:"Any continuous activity 15+ min — cycling, swimming, running",ar:"أي نشاط متواصل 15 دقيقة — دراجة، سباحة، جري"},
    court_awareness:{en:"Watch basketball highlights — ask where players should be",ar:"شاهد مقاطع كرة سلة واسأل أين يجب أن يكون اللاعبون"},
    decision_making:{en:"Play board games or strategy games that require thinking ahead",ar:"العب ألعاب لوحية تتطلب التفكير"},
    teamwork:{en:"Group activities — board games, team cooking, group projects",ar:"أنشطة جماعية — ألعاب لوحية، طبخ جماعي"},
    sportsmanship:{en:"Discuss wins/losses from TV sports — what is good behavior?",ar:"ناقش الفوز والخسارة من الرياضة على التلفزيون"},
    effort:{en:"Set a daily goal — ask before/after: what to improve? did you try your best?",ar:"ضع هدف يومي — اسأل قبل/بعد: ماذا تحسن؟ هل بذلت جهدك؟"},
    coachability:{en:"Practice active listening — repeat instructions before doing them",ar:"تمرين الاستماع — يكرر التعليمات قبل تنفيذها"},
    leadership:{en:"Give small responsibilities at home — organizing, helping siblings",ar:"أعطِ مسؤوليات صغيرة — تنظيم، مساعدة الإخوة"},
  };

  // Weakest skills → coach and parent recs
  weakest.forEach(([sid,v])=>{
    const sk=SK[sid];if(!sk)return;
    recs.coach.push("Focus on "+sk.n+" — currently "+v+"/5. Use extra drill time for this skill.");
    const ha=homeActs[sid];
    if(ha)recs.parent.push({skill:sk.n,skillAr:sk.a,en:ha.en,ar:ha.ar,done:false});
    recs.child.push("Practice "+sk.n+" this week! You can do it! 💪 | تمرن على "+sk.a+" هذا الأسبوع!");
  });

  // Strongest → celebrate
  strongest.forEach(([sid,v])=>{
    const sk=SK[sid];if(!sk)return;
    recs.coach.push("Celebrate "+sk.n+" ("+v+"/5) — challenge "+name+" with advanced drills.");
  });

  // Effort specific
  if(Number(skills.effort)<=2)recs.coach.push("PRIORITY: "+name+"'s effort is low. Use positive reinforcement. Set small achievable goals.");
  if(Number(skills.coachability)>=4)recs.coach.push(name+" is highly coachable — can help demonstrate drills to younger players.");
  if(Number(skills.teamwork)<=2)recs.coach.push("Pair "+name+" with a strong team player for drills to build teamwork naturally.");

  return recs;
}

// ─── UTILS ───────────────────────────
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

function rc(v){return v>=4?"#047857":v>=3?"#d97706":"#dc2626"}

// ─── API ─────────────────────────────
async function api(){
  load(true);
  try{const r=await fetch(API+"?action=getAll");const d=await r.json();
    if(d.success){
      d.evaluations=(d.evaluations||[]).map(e=>({...e,attended:e.attended===true||e.attended==="true"||e.attended==="TRUE",skills:typeof e.skills_json==="string"?JSON.parse(e.skills_json||"{}"):e.skills_json||{}}));
      d.players=(d.players||[]).map(p=>({...p,active:p.active!==false&&p.active!=="false",age:Number(p.age)||0,height_cm:Number(p.height_cm)||0,weight_kg:Number(p.weight_kg)||0}));
      S.d=d;
    }
  }catch(e){toast("Offline mode")}
  load(false);
}
async function post(body){
  load(true);
  try{const r=await fetch(API,{method:"POST",body:JSON.stringify(body),headers:{"Content-Type":"text/plain"}});const d=await r.json();load(false);
    if(d.success){await api();return true}toast("Error: "+(d.error||"?"));return false;
  }catch(e){load(false);toast("Network error");return false}
}

// ─── STATS ───────────────────────────
function stats(pid){
  const ev=S.d.evaluations.filter(e=>e.player_id===pid&&e.attended);
  if(!ev.length)return null;
  const lat=ev[ev.length-1];const byCat={};
  RCATS.forEach(cat=>{
    const vals=ev.map(e=>{const v=cat.sk.map(s=>Number(e.skills?.[s])||0).filter(x=>x>0);return v.length?av(v):0}).filter(x=>x>0);
    const lv=cat.sk.map(s=>Number(lat.skills?.[s])||0).filter(x=>x>0);
    byCat[cat.id]={avg:av(vals),trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0};
  });
  const bySk={};
  RCATS.forEach(cat=>cat.sk.forEach(sid=>{
    const vals=ev.map(e=>Number(e.skills?.[sid])||0).filter(x=>x>0);
    if(vals.length)bySk[sid]={avg:av(vals),trend:vals.length>=2?vals[vals.length-1]-vals[vals.length-2]:0};
  }));
  const overall=av(Object.values(byCat).map(c=>c.avg).filter(x=>x>0));
  const allEv=S.d.evaluations.filter(e=>e.player_id===pid);
  const att=allEv.length?(allEv.filter(e=>e.attended).length/allEv.length*100):0;
  return{sessions:ev.length,byCat,bySk,overall,att,latest:lat};
}

function makeRadar(skills){
  const sz=220,cx=sz/2,cy=sz/2,r=sz/2-32,ids=["ball_handling","speed_agility","court_awareness","effort","teamwork"],lb=["Ball","Speed","Court","Effort","Team"],n=ids.length;
  let s='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+" "+sz+'">';
  for(let l=1;l<=5;l++){let p=[];for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;p.push((cx+r*l/5*Math.cos(a)).toFixed(1)+","+(cy+r*l/5*Math.sin(a)).toFixed(1))}s+='<polygon points="'+p.join(" ")+'" fill="none" stroke="#e2e8f0" stroke-width="1"/>';}
  let p=[];for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;const v=Number(skills[ids[i]])||0;p.push((cx+r*v/5*Math.cos(a)).toFixed(1)+","+(cy+r*v/5*Math.sin(a)).toFixed(1));s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#e2e8f0"/>';}
  s+='<polygon points="'+p.join(" ")+'" fill="rgba(26,86,168,.15)" stroke="#1a56a8" stroke-width="2.5"/>';
  for(let i=0;i<n;i++){const a=2*Math.PI*i/n-Math.PI/2;const v=Number(skills[ids[i]])||0;s+='<circle cx="'+(cx+r*v/5*Math.cos(a)).toFixed(1)+'" cy="'+(cy+r*v/5*Math.sin(a)).toFixed(1)+'" r="3.5" fill="#1a56a8"/>';const x=cx+(r+22)*Math.cos(a),y=cy+(r+22)*Math.sin(a);s+='<text x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">'+lb[i]+'</text>';}
  s+='</svg>';return s;
}

// ─── SKILL ANALYSIS TEXT ─────────────
function skTxt(sid,v,name){
  const t={

// ═══ AI PROFILE — ARCHETYPE & PATTERNS ═══
function getArchetype(skills){
  if(!skills||!Object.keys(skills).length)return{name:"New Player",ar:"لاعب جديد",emoji:"\uD83C\uDFC0"};
  const g=k=>Number(skills[k])||0;
  if(g("leadership")>=4&&g("teamwork")>=4)return{name:"Natural Leader",ar:"قائد بالفطرة",emoji:"\uD83D\uDC51"};
  if(g("speed_agility")>=4&&g("endurance")>=3)return{name:"Athletic Engine",ar:"محرك رياضي",emoji:"\u26A1"};
  if(g("ball_handling")>=4&&g("court_awareness")>=3)return{name:"Court General",ar:"جنرال الملعب",emoji:"\uD83E\uDDE0"};
  if(g("effort")>=4&&g("coachability")>=4)return{name:"Growth Mindset",ar:"عقلية النمو",emoji:"\uD83D\uDE80"};
  if(g("sportsmanship")>=4)return{name:"Team Spirit",ar:"روح الفريق",emoji:"\uD83E\uDD1D"};
  const vals=Object.values(skills).map(Number).filter(v=>v>0);const avg2=av(vals);
  if(avg2>=3)return{name:"All-Rounder",ar:"شامل",emoji:"\u2B50"};
  if(avg2>=2)return{name:"Rising Star",ar:"نجم صاعد",emoji:"\uD83C\uDF1F"};
  return{name:"Explorer",ar:"مستكشف",emoji:"\uD83C\uDFC0"};
}

function getPatterns(playerEvals){
  const patterns=[];if(playerEvals.length<2)return patterns;
  const traj={};
  playerEvals.forEach(ev=>{Object.entries(ev.skills||{}).forEach(([sid,val])=>{const v=Number(val);if(!v)return;if(!traj[sid])traj[sid]=[];traj[sid].push(v)})});
  Object.entries(traj).forEach(([sid,vals])=>{
    if(vals.length<2)return;
    const sk=SK[sid];if(!sk)return;
    if(vals.every((v,i)=>i===0||v>=vals[i-1])&&vals[vals.length-1]>vals[0])
      patterns.push({type:"up",skill:sk.n,text:sk.n+" improved every session ("+vals.join(" \u2192 ")+")"});
    else if(vals.every((v,i)=>i===0||v<=vals[i-1])&&vals[vals.length-1]<vals[0])
      patterns.push({type:"down",skill:sk.n,text:sk.n+" declined ("+vals.join(" \u2192 ")+") \u2014 training approach may need adjustment"});
  });
  // Character vs technical
  const last=playerEvals[playerEvals.length-1].skills||{};
  const techSk=["ball_handling","shooting","passing","layups","defense"];
  const charSk=["effort","teamwork","sportsmanship","coachability","leadership"];
  const tAvg=av(techSk.map(s=>Number(last[s])||0).filter(v=>v>0));
  const cAvg=av(charSk.map(s=>Number(last[s])||0).filter(v=>v>0));
  if(cAvg>tAvg+0.5)patterns.push({type:"insight",text:"Character skills ("+cAvg.toFixed(1)+") ahead of technical ("+tAvg.toFixed(1)+") \u2014 has the attitude, needs the drills"});
  else if(tAvg>cAvg+0.5)patterns.push({type:"insight",text:"Technical skills ("+tAvg.toFixed(1)+") ahead of character ("+cAvg.toFixed(1)+") \u2014 focus on teamwork and effort"});
  return patterns;
}

function getLearningStyle(skills){
  const c=Number(skills.coachability)||0,e=Number(skills.effort)||0;
  if(c>=4&&e>=4)return"Responds to direct coaching. Can handle complex instructions. Challenge with advanced techniques.";
  if(c>=3&&e<=2)return"Understands instructions but needs motivation. Use concrete, countable challenges.";
  if(c<=2&&e>=3)return"Works hard but needs instructions repeated. Show, don't tell.";
  return"Needs patient, step-by-step guidance with lots of encouragement.";
}

function getOverride(pid){
  return S.d.messages.find(m=>m.type==="admin_override"&&String(m.text).startsWith("OVERRIDE:"+pid+":"));

function parseOverride(msg){
  if(!msg)return null;
  try{const parts=msg.text.split("OVERRIDE:")[1];const pid=parts.split(":")[0];const json=parts.substring(pid.length+1);return JSON.parse(json)}catch(e){return null}
}

  const pin=document.getElementById("pv").value.trim();

    toast("Loading...");

      }

        const pp=String(p.parent_pin||"").trim();

        if(t==="parent"){S.mode="parent";S.pt="report"}else{S.mode="kid";S.kt="scores"}

      }

}

    const recs=getRecs(latSkills,p.name,p.age);

    h+='</div></div>';
  });
  return h+'</div>';
}

      const v=Number(lat[sid])||0;if(!v)return;
      const sk=SK[sid];if(!sk)return;
      const pv=Number(prevSk[sid])||0;
      const diff=pv?v-pv:0;
      const arrow=diff>0?'<span style="color:var(--g);font-weight:700;font-size:11px"> \u2191+'+diff+'</span>':diff<0?'<span style="color:var(--r);font-weight:700;font-size:11px"> \u2193'+diff+'</span>':'';
      const emoji=v>=4?"\uD83C\uDF1F":v>=3?"\uD83D\uDC4D":v>=2?"\uD83C\uDFC0":"\uD83D\uDCAA";
      h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:12px;font-weight:600">'+emoji+' '+sk.n+' <span style="color:var(--t3);font-size:10px">'+sk.a+'</span></span><span style="font-weight:800;color:'+rc(v)+'">'+v+'/5'+arrow+'</span></div>';
      h+='<div style="display:flex;gap:3px">';
      for(let i=1;i<=5;i++)h+='<div style="flex:1;height:8px;border-radius:4px;background:'+(i<=v?rc(v):"#e2e8f0")+'"></div>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });

  // ═══ DETAILED ANALYSIS (top skills) ═══
  h+='<div style="font-weight:700;font-size:16px;margin:20px 0 12px">\uD83D\uDCCB Coach Analysis / تحليل المدرب</div>';
  // Strengths
  const strong=Object.entries(lat).filter(([k,v])=>Number(v)>=4).sort((a,b)=>Number(b[1])-Number(a[1]));
  if(strong.length){
    h+='<div style="background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;padding:14px;margin-bottom:12px"><div style="font-weight:700;color:#047857;margin-bottom:8px">\uD83C\uDF1F Strengths / نقاط القوة</div>';
    strong.forEach(([sid,v])=>{const sk=SK[sid];if(!sk)return;const txt=skTxt(sid,Number(v),ch.name);
      h+='<div style="padding:6px 0;border-bottom:1px solid #d1fae5"><div style="display:flex;justify-content:space-between"><span style="font-weight:600;font-size:13px">'+sk.n+' \u2014 '+sk.a+'</span><span style="font-weight:800;color:#047857">'+v+'/5</span></div><p style="font-size:11px;color:#065f46;margin:2px 0 0">'+txt+'</p></div>'});
    h+='</div>';
  }

  // Focus areas
  const weak=Object.entries(lat).filter(([k,v])=>Number(v)<=2).sort((a,b)=>Number(a[1])-Number(b[1]));
  if(weak.length){
    h+='<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px;margin-bottom:12px"><div style="font-weight:700;color:#dc2626;margin-bottom:8px">\uD83C\uDFAF Focus Areas / مجالات التطوير</div>';
    weak.forEach(([sid,v])=>{const sk=SK[sid];if(!sk)return;const txt=skTxt(sid,Number(v),ch.name);const tgt=Math.min(Number(v)+1,5);
      h+='<div style="padding:6px 0;border-bottom:1px solid #fecaca"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600;font-size:13px">'+sk.n+' \u2014 '+sk.a+'</span><span style="font-size:12px"><span style="color:var(--r);font-weight:800">'+v+'</span> \u2192 <span style="color:var(--g);font-weight:800">'+tgt+'</span></span></div><p style="font-size:11px;color:#991b1b;margin:2px 0 0">'+txt+'</p></div>'});
    h+='</div>';
  }

  // Middle skills
  const mid=Object.entries(lat).filter(([k,v])=>Number(v)===3).sort();
  if(mid.length){
    h+='<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:12px"><div style="font-weight:700;color:#d97706;margin-bottom:8px">\uD83D\uDC4D Good & Growing / جيد ومتطور ('+mid.length+' skills)</div>';
    mid.forEach(([sid,v])=>{const sk=SK[sid];if(!sk)return;
      h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:13px"><span>'+sk.n+' \u2014 '+sk.a+'</span><span style="font-weight:700;color:#d97706">'+v+'/5</span></div>'});
    h+='</div>';
  }

  // ═══ IMPROVEMENT VELOCITY ═══
  if(chSess.length>=2){
    const weeks=chSess.length;
    const firstEv2=S.d.evaluations.find(e=>e.session_id===chSess[0].id&&e.player_id===ch.id&&e.attended);
    const lastEv2=S.d.evaluations.find(e=>e.session_id===chSess[chSess.length-1].id&&e.player_id===ch.id&&e.attended);
    if(firstEv2&&lastEv2){
      const fV=Object.values(firstEv2.skills).map(Number).filter(v=>v>0);
      const lV=Object.values(lastEv2.skills).map(Number).filter(v=>v>0);
      const velocity=(av(lV)-av(fV))/(weeks-1);
      if(velocity>0){
        const current=av(lV);const toThree=current<3?(3-current)/velocity:0;
        h+='<div style="background:linear-gradient(135deg,#1e40af,#7c3aed);border-radius:12px;padding:16px;color:#fff;margin:16px 0;text-align:center"><div style="font-size:11px;opacity:.7;margin-bottom:4px">\u26A1 IMPROVEMENT SPEED / سرعة التحسن</div><div style="font-size:32px;font-weight:900">+'+velocity.toFixed(2)+'/week</div><div style="font-size:12px;opacity:.8;margin-top:4px">'+(toThree>0?'At this rate, reaches "Good" level in ~'+Math.ceil(toThree)+' weeks':'Already at "Good" level or above \u2014 keep going!')+'</div></div>';
      }
    }
  }

  // ═══ PERSONALIZED WEEKLY MESSAGE ═══
  const latVals2=Object.values(lat).map(Number).filter(v=>v>0);const latAvg2=av(latVals2);
  const bestSkill=Object.entries(lat).sort((a,b)=>Number(b[1])-Number(a[1]))[0];
  const worstSkill=Object.entries(lat).sort((a,b)=>Number(a[1])-Number(b[1]))[0];
  const bestName=bestSkill&&SK[bestSkill[0]]?SK[bestSkill[0]].n:"";
  const worstName=worstSkill&&SK[worstSkill[0]]?SK[worstSkill[0]].n:"";
  h+='<div style="background:linear-gradient(135deg,#047857,#059669);border-radius:12px;padding:16px;color:#fff;margin:16px 0"><div style="font-weight:700;margin-bottom:8px">\uD83D\uDCAC This Week\'s Message / رسالة الأسبوع</div><p style="font-size:13px;line-height:1.6;opacity:.95">';
  if(latAvg2>=3.5)h+=ch.name+' is doing excellent work! Strongest area: '+bestName+'. Challenge for next week: push '+worstName+' to the next level.';
  else if(latAvg2>=2.5)h+=ch.name+' is making real progress! '+bestName+' is a real strength. This week, focus on '+worstName+' practice at home \u2014 even 5 minutes daily makes a difference.';
  else h+=ch.name+' is building foundations every session. The most important thing right now is showing up, trying hard, and having fun. Every champion started exactly here.';
  h+='</p></div>';

  // ═══ HOME ACTIVITIES ═══
  if(recs.parent.length){
    h+='<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:16px;margin:16px 0"><div style="font-weight:700;color:#c2410c;margin-bottom:10px">\uD83C\uDFE0 This Week at Home / هذا الأسبوع في المنزل</div>';
    recs.parent.forEach((r,i)=>{
      h+='<div class="chk" id="ha'+i+'" onclick="this.classList.toggle(\'done\')"><span style="font-size:18px">\u2705</span><div><div style="font-weight:600;font-size:12px">'+r.skill+' \u2014 '+r.skillAr+'</div><div style="font-size:11px;color:#7c2d12">'+r.en+'</div><div style="font-size:11px;color:#9a3412;direction:rtl;text-align:right">'+r.ar+'</div></div></div>';
    });
    h+='</div>';
  }

  // ═══ SESSION HISTORY (expandable) ═══
  if(chSess.length>1){
    h+='<div class="cd"><div class="ch">\uD83D\uDCC5 Session History / سجل الجلسات</div><div class="cb">';
    chSess.slice().reverse().forEach((s,si)=>{
      const ev=S.d.evaluations.find(e=>e.session_id===s.id&&e.player_id===ch.id&&e.attended);
      if(!ev)return;const sk=ev.skills||{};
      const vals=Object.values(sk).map(Number).filter(v=>v>0);const savg=av(vals);
      h+='<div style="padding:10px 0;border-bottom:1px solid #f1f5f9;cursor:pointer" onclick="var el=document.getElementById(\'sh'+si+'\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:14px">'+fd(s.date)+'</div><div style="font-size:11px;color:var(--t3)">Coach: '+(s.coach||"\u2014")+' \u00B7 '+vals.length+' skills rated</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:900;color:'+rc(savg)+'">'+savg.toFixed(1)+'</div><div style="font-size:10px;color:var(--t3)">tap to expand</div></div></div>';
      h+='<div id="sh'+si+'" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0">';
      Object.entries(sk).forEach(([sid2,v2])=>{
        const skInfo=SK[sid2];if(!skInfo||!v2)return;
        h+='<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:12px"><span style="color:var(--t2)">'+skInfo.n+'</span><span style="font-weight:700;color:'+rc(Number(v2))+'">'+v2+'/5</span></div>';
      });
      h+='</div></div>';
    });
    h+='</div></div>';
  }

  // Parent letter
  h+='<div style="background:#fdf4ff;border:1px solid #e9d5ff;border-radius:12px;padding:16px;margin:16px 0"><div style="font-weight:700;color:#7c3aed;margin-bottom:8px">\uD83D\uDCAC Dear Parent / عزيزي ولي الأمر</div><p style="font-size:13px;color:#4c1d95;line-height:1.6;margin:0">Your child is on a journey. The numbers are not grades \u2014 they are a map showing where we are and where we\'re going together. Your encouragement at home is just as important as our coaching on the court.</p></div>';

  h+='<div style="text-align:center;padding:20px;font-size:11px;color:var(--t3)">HOST Academy v3.0 \u00B7 Powered by AI</div>';
  return h+'</div>';
}

function vAdmin(){
  let h='<div class="hd" style="background:linear-gradient(135deg,#6d28d9,#6d28d9dd)"><div><h2>\uD83C\uDFC0 Admin / \u0627\u0644\u0625\u062F\u0627\u0631\u0629</h2></div><div style="display:flex;gap:6px"><button class="hb" onclick="logout()">Logout</button></div></div>';
  const tabs=[["players","\uD83D\uDC65","Players / \u0627\u0644\u0644\u0627\u0639\u0628\u064A\u0646"],["messages","\uD83D\uDCE2","Messages / \u0627\u0644\u0631\u0633\u0627\u0626\u0644"],["data","\uD83D\uDCBE","Data / \u0627\u0644\u0628\u064A\u0627\u0646\u0627\u062A"]];
  h+='<div class="nv">'+tabs.map(t=>'<button class="'+(S.at===t[0]?"a":"")+'" onclick="S.at=\''+t[0]+'\';S.sp=null;R()"><span style="font-size:18px">'+t[1]+'</span>'+t[2]+'</button>').join("")+'</div><div class="ct">';
  if(S.at==="players")h+=vAP();
  else if(S.at==="messages")h+=vAM();
  else if(S.at==="data")h+=vAD();
  return h+'</div>';
}

function vAP(){
  if(S.sp)return vAR();
  const pl=S.d.players;
  if(!S.adminSort)S.adminSort="score";
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 class="tl" style="margin:0">Players ('+pl.length+')</h2><button class="bp" onclick="document.getElementById(\'af\').classList.toggle(\'hid\')">+ Add / \u0625\u0636\u0627\u0641\u0629</button></div>';
  h+='<div id="af" class="hid cd"><div class="ch">Add Player</div><div class="cb"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Name / \u0627\u0644\u0627\u0633\u0645 *</label><input class="fi" id="np_n"></div><div class="fg"><label class="fl">Age / \u0627\u0644\u0639\u0645\u0631</label><input class="fi" id="np_a" type="number"></div><div class="fg"><label class="fl">Height / \u0627\u0644\u0637\u0648\u0644 cm</label><input class="fi" id="np_h" type="number"></div><div class="fg"><label class="fl">Weight / \u0627\u0644\u0648\u0632\u0646 kg</label><input class="fi" id="np_w" type="number"></div><div class="fg"><label class="fl">Parent / \u0648\u0644\u064A \u0627\u0644\u0623\u0645\u0631</label><input class="fi" id="np_p"></div><div class="fg"><label class="fl">Phone / \u0627\u0644\u0647\u0627\u062A\u0641</label><input class="fi" id="np_ph"></div></div><div class="fg"><label class="fl">Medical / \u0637\u0628\u064A</label><input class="fi" id="np_m"></div><button class="bp" onclick="addP()">Save</button></div></div>';
  
  // Sort buttons
  h+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  ["score","name","age"].forEach(s=>{h+='<button style="flex:1;padding:8px;border:1px solid '+(S.adminSort===s?"var(--b)":"var(--br)")+';border-radius:8px;background:'+(S.adminSort===s?"#eff6ff":"transparent")+';color:'+(S.adminSort===s?"var(--b)":"var(--t2)")+';font-size:12px;font-weight:600;cursor:pointer" onclick="S.adminSort=\''+s+'\';R()">'+(s==="score"?"By Score / \u0628\u0627\u0644\u0646\u062A\u064A\u062C\u0629":s==="name"?"By Name / \u0628\u0627\u0644\u0627\u0633\u0645":"By Age / \u0628\u0627\u0644\u0639\u0645\u0631")+'</button>'});
  h+='</div>';
  
  // Sort players
  let sorted=[...pl];
  if(S.adminSort==="score")sorted.sort((a,b)=>{const sa=stats(a.id),sb=stats(b.id);return(sb?sb.overall:0)-(sa?sa.overall:0)});
  else if(S.adminSort==="name")sorted.sort((a,b)=>a.name.localeCompare(b.name));
  else sorted.sort((a,b)=>(a.age||0)-(b.age||0));
  
  sorted.forEach(p=>{
    const st2=stats(p.id);
    const arch=st2?getArchetype(st2.latest.skills||{}):{emoji:"\uD83C\uDFC0",name:"New"};
    const scoreColor=st2?(st2.overall>=3?"var(--g)":st2.overall>=2?"var(--o)":"var(--r)"):"var(--t3)";
    
    h+='<div class="cd" style="cursor:pointer;opacity:'+(p.active!==false?1:.5)+'" onclick="S.sp=\''+p.id+'\';R()">';
    h+='<div class="cb" style="padding:12px 16px"><div style="display:flex;align-items:center;gap:10px">';
    h+='<div class="av" style="width:48px;height:48px;font-size:20px">'+p.name.charAt(0)+'</div>';
    h+='<div style="flex:1"><div style="font-weight:700;font-size:15px">'+p.name+(p.age?" ("+p.age+")":"")+'</div>';
    h+='<div style="font-size:12px;color:var(--t2)">'+(p.parent_name||"\u2014")+' \u00B7 PIN: <b>'+p.parent_pin+'</b></div>';
    h+='<div style="display:flex;gap:6px;margin-top:3px">';
    if(st2)h+='<span style="font-size:10px;color:#7c3aed;background:#ede9fe;padding:1px 8px;border-radius:10px">'+arch.emoji+' '+arch.name+'</span>';
    if(st2)h+='<span style="font-size:10px;color:var(--t3)">'+st2.sessions+' sessions</span>';
    if(p.medical_notes)h+='<span style="font-size:10px;color:var(--o)">\u2695\uFE0F</span>';
    h+='</div></div>';
    // Score on right
    if(st2)h+='<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:'+scoreColor+'">'+st2.overall.toFixed(1)+'</div><div style="font-size:10px;color:var(--t3)">/5</div></div>';
    else h+='<div style="font-size:12px;color:var(--t3)">No data</div>';
    h+='</div></div></div>';
  });
  return h;
}

async function addP(){
  const n=document.getElementById("np_n").value.trim();if(!n){toast("Enter name");return}
  const pin=String(Math.floor(1000+Math.random()*9000));
  if(await post({action:"addPlayer",player:{id:gid(),name:n,age:document.getElementById("np_a").value,height_cm:document.getElementById("np_h").value,weight_kg:document.getElementById("np_w").value,parent_name:document.getElementById("np_p").value.trim(),parent_phone:document.getElementById("np_ph").value.trim(),parent_pin:pin,medical_notes:document.getElementById("np_m").value.trim()}})){toast(n+" added (PIN: "+pin+")");R()}
}

function vAR(){
  if(!S.sp){
    let h='<h2 class="tl">Reports</h2>';
    S.d.players.filter(p=>p.active!==false).forEach(p=>{const st2=stats(p.id);const arch=st2?getArchetype(st2.latest.skills||{}):{emoji:"\uD83C\uDFC0",name:""};h+='<div class="cd" style="cursor:pointer" onclick="S.sp=\''+p.id+'\';R()"><div class="cb"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:10px"><div class="av">'+p.name.charAt(0)+'</div><div><div style="font-weight:700">'+p.name+(st2?' <span style="font-size:11px;color:#7c3aed">'+arch.emoji+' '+arch.name+'</span>':'')+'</div><div style="font-size:12px;color:var(--t2)">'+(st2?st2.sessions+" sessions \u00B7 "+st2.overall.toFixed(1)+"/5":"No data")+'</div></div></div><span>\u2192</span></div></div></div>'});
    return h;
  }
  const p=S.d.players.find(x=>x.id===S.sp);const st2=stats(p.id);
  let h='<button class="bs" onclick="S.sp=null;R()">\u2190 Back / \u0631\u062C\u0648\u0639</button><div style="display:flex;align-items:center;gap:12px;margin:16px 0"><div class="av" style="width:52px;height:52px;font-size:22px">'+p.name.charAt(0)+'</div><div><div style="font-size:22px;font-weight:800">'+p.name+'</div><div style="font-size:13px;color:var(--t2)">Age '+p.age+(st2?" \u00B7 "+st2.sessions+" sessions":"")+(p.medical_notes?" \u00B7 \u2695\uFE0F "+p.medical_notes:"")+'</div></div></div>';
  if(st2){
    h+='<div style="text-align:center;padding:20px;background:linear-gradient(135deg,#6d28d9,#4c1d95);border-radius:16px;color:#fff;margin-bottom:16px"><div style="font-size:44px;font-weight:900">'+st2.overall.toFixed(1)+'</div><div style="font-size:13px;opacity:.8">Overall \u00B7 Attendance: '+st2.att.toFixed(0)+'%</div></div>';

    // AI Archetype
    const arch=getArchetype(st2.latest.skills||{});
    const ovr=getOverride(p.id);const ovrD=parseOverride(ovr);
    const dArch=ovrD&&ovrD.archetype?{name:ovrD.archetype,ar:ovrD.archetype_ar||"",emoji:arch.emoji}:arch;
    h+='<div class="cd"><div class="cb" style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:20px">'+dArch.emoji+'</div><div><div style="font-size:10px;color:var(--t3);letter-spacing:1px">AI IDENTITY</div><div style="font-size:16px;font-weight:800;color:#534AB7">'+dArch.name+'</div>'+(dArch.ar?'<div style="font-size:12px;color:#7c3aed">'+dArch.ar+'</div>':'')+'</div></div></div>';

    // Learning style
    const lStyle=ovrD&&ovrD.learning_style?ovrD.learning_style:getLearningStyle(st2.latest.skills||{});
    h+='<div style="background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:2px">Learning Style</div><div style="font-size:12px;color:var(--t)">'+lStyle+'</div></div>';

    // Velocity
    const allEv=S.d.evaluations.filter(e=>e.player_id===p.id&&e.attended);
    const chSess=S.d.sessions.filter(s=>S.d.evaluations.some(e=>e.session_id===s.id&&e.player_id===p.id&&e.attended));
    if(chSess.length>=2){
      const fEv=S.d.evaluations.find(e=>e.session_id===chSess[0].id&&e.player_id===p.id&&e.attended);
      const lEv=S.d.evaluations.find(e=>e.session_id===chSess[chSess.length-1].id&&e.player_id===p.id&&e.attended);
      if(fEv&&lEv){
        const fV=Object.values(fEv.skills).map(Number).filter(v=>v>0);
        const lV=Object.values(lEv.skills).map(Number).filter(v=>v>0);
        const vel=(av(lV)-av(fV))/(chSess.length-1);
        if(vel!==0)h+='<div style="background:#EEEDFE;border-radius:10px;padding:10px;margin-bottom:12px;text-align:center"><div style="font-size:10px;color:#534AB7;letter-spacing:1px">VELOCITY</div><div style="font-size:24px;font-weight:800;color:#3C3489">'+(vel>0?"+":"")+vel.toFixed(2)+'/week</div></div>';
      }
    }

    // Patterns
    const pEvs=allEv.map(e=>({skills:e.skills}));
    const patterns=getPatterns(pEvs);
    if(patterns.length){
      h+='<div class="cd"><div class="ch">AI Patterns</div><div class="cb">';
      patterns.forEach(pt=>{
        const cl=pt.type==="up"?"#059669":pt.type==="down"?"#dc2626":"#7c3aed";
        h+='<div style="padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:12px;color:'+cl+';font-weight:600">'+pt.text+'</div>';
      });
      h+='</div></div>';
    }

    // Session timeline
    if(chSess.length>1){
      h+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:12px;overflow-x:auto">';
      chSess.forEach((s,i)=>{
        const ev=S.d.evaluations.find(e=>e.session_id===s.id&&e.player_id===p.id&&e.attended);
        const sk=ev?ev.skills:{};const vals=Object.values(sk).map(Number).filter(v=>v>0);
        const a2=vals.length?av(vals):0;const isL=i===chSess.length-1;
        h+='<div style="flex:1;min-width:60px;text-align:center"><div style="font-size:10px;color:var(--t3)">'+fd(s.date).split(" ").slice(0,2).join(" ")+'</div><div style="font-size:18px;font-weight:800;color:'+(isL?"var(--b)":"var(--t3)")+'">'+a2.toFixed(1)+'</div></div>';
        if(i<chSess.length-1)h+='<div style="color:var(--t3)">\u2192</div>';
      });
      h+='</div>';
    }

    // All 15 skills with trends
    RCATS.forEach(cat=>{const cd=st2.byCat[cat.id];if(!cd||cd.avg===0)return;
      h+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px"><span style="font-weight:600">'+cat.ic+' '+cat.nm+'</span><span style="font-weight:700">'+cd.avg.toFixed(1)+'</span></div><div class="pb"><div class="pf" style="width:'+cd.avg/5*100+'%;background:'+cat.cl+'"></div></div>';
      cat.sk.forEach(sid=>{const sd=st2.bySk[sid];if(!sd)return;const sk=SK[sid];
        const trend=sd.trend>0.1?' <span style="color:var(--g);font-size:10px">\u2191+'+sd.trend.toFixed(1)+'</span>':sd.trend<-0.1?' <span style="color:var(--r);font-size:10px">\u2193'+sd.trend.toFixed(1)+'</span>':'';
        h+='<div style="display:flex;justify-content:space-between;padding:4px 0 4px 20px;font-size:13px"><span style="color:var(--t2)">'+sk.n+'</span><span style="font-weight:700;color:'+rc(sd.avg)+'">'+sd.avg.toFixed(1)+trend+'</span></div>'});
      h+='</div>';
    });
    h+='<button class="bp bf" style="margin-top:16px" onclick="genWA(\''+p.id+'\')">\uD83D\uDCF1 WhatsApp Report / \u062A\u0642\u0631\u064A\u0631</button><div id="war"></div>';
    // Admin edit AI profile
    const curOvr=getOverride(p.id);const curData=parseOverride(curOvr);
    const curArch=getArchetype(st2.latest.skills||{});
    h+='<div class="cd" style="margin-top:12px"><div class="ch">\u270F\uFE0F Edit AI Profile / \u062A\u0639\u062F\u064A\u0644 \u0627\u0644\u0645\u0644\u0641</div><div class="cb">';
    h+='<div class="fg"><label class="fl">Archetype / النمط</label><input class="fi" id="ov_arch" value="'+(curData&&curData.archetype?curData.archetype:curArch.name)+'" placeholder="e.g. Natural Leader"></div>';
    h+='<div class="fg"><label class="fl">Archetype Arabic</label><input class="fi" id="ov_arch_ar" value="'+(curData&&curData.archetype_ar?curData.archetype_ar:curArch.ar)+'" placeholder="e.g. قائد بالفطرة"></div>';
    h+='<div class="fg"><label class="fl">Learning Style Override</label><textarea class="fi" id="ov_learn" placeholder="Leave empty for auto-generated">'+(curData&&curData.learning_style?curData.learning_style:"")+'</textarea></div>';
    h+='<div class="fg"><label class="fl">Custom Message to Parent</label><textarea class="fi" id="ov_msg" placeholder="Write a personal message about this child...">'+(curData&&curData.message?curData.message:"")+'</textarea></div>';
    h+='<button class="bg bf" onclick="saveOverride(\''+p.id+'\')">Save / \u062D\u0641\u0638</button>';
    if(curOvr)h+='<button class="bs bf" style="margin-top:6px;font-size:12px;color:var(--r)" onclick="clearOverride(\''+p.id+'\')">Clear Overrides</button>';
    h+='</div></div>';
  }
  return h;
}

function genWA(pid){
  const p=S.d.players.find(x=>x.id===pid);const st2=stats(pid);if(!p||!st2)return;
  let t="\uD83C\uDFC0 *HOST Academy Report*\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n*"+p.name+"*\nAge: "+p.age+" | Sessions: "+st2.sessions+" | Overall: "+st2.overall.toFixed(1)+"/5\n";
  RCATS.forEach(cat=>{const cd=st2.byCat[cat.id];if(!cd||cd.avg===0)return;t+="\n"+cat.ic+" *"+cat.nm+":* "+cd.avg.toFixed(1)+"/5\n";cat.sk.forEach(sid=>{const sd=st2.bySk[sid];if(!sd)return;t+="  "+SK[sid].n+": "+sd.avg.toFixed(1)+"\n"})});
  t+="\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n_HOST Academy v3.0_";
  document.getElementById("war").innerHTML='<div class="cd" style="margin-top:12px"><div class="ch">Copy & Send</div><div class="cb"><pre id="wat" style="white-space:pre-wrap;font-size:12px">'+t+'</pre><button class="bg bf" style="margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById(\'wat\').textContent).then(()=>toast(\'Copied!\'))">\uD83D\uDCCB Copy</button></div></div>';
}

function vAM(){
  let h='<h2 class="tl">Messages / \u0627\u0644\u0631\u0633\u0627\u0626\u0644</h2><div class="cd"><div class="cb"><textarea class="fi" id="mt" placeholder="Message for parents & kids... / \u0631\u0633\u0627\u0644\u0629 \u0644\u0644\u0623\u0647\u0627\u0644\u064A"></textarea><button class="bp bf" style="margin-top:8px" onclick="sendMsg()">\uD83D\uDCE2 Send / \u0625\u0631\u0633\u0627\u0644</button></div></div>';
  S.d.messages.forEach(m=>{
    const ic=m.type==="parent_checkin"?"\uD83D\uDCDD":m.type==="parent_feedback"?"\u2B50":m.type==="kid_rating"?"\uD83C\uDFC0":"\uD83D\uDCE2";
    const bg=m.type==="parent_checkin"?"#fef3c7":m.type==="parent_feedback"?"#ede9fe":m.type==="kid_rating"?"#ecfeff":"#fff";
    const bc=m.type==="parent_checkin"?"#d97706":m.type==="parent_feedback"?"#7c3aed":m.type==="kid_rating"?"#0891b2":"var(--b)";
    h+='<div class="cd" style="border-left:3px solid '+bc+'"><div class="cb" style="background:'+bg+'"><div style="display:flex;justify-content:space-between"><span style="font-size:11px;color:var(--t3)">'+fd(m.date)+'</span><span style="font-size:10px;font-weight:600">'+ic+'</span></div><div style="font-size:11px;font-weight:600;margin-top:2px">'+(m.from_name||"HOST")+'</div><div style="font-size:13px;margin-top:4px">'+m.text+'</div></div></div>'});
  return h;
}

async function sendMsg(){
  const t=document.getElementById("mt").value.trim();if(!t){toast("Write a message");return}
  if(await post({action:"sendMessage",message:{id:gid(),date:new Date().toISOString(),from_name:"HOST Academy",text:t,type:"announcement"}})){toast("Sent!");R()}
}

async function saveOverride(pid){
  const arch=document.getElementById("ov_arch").value.trim();
  const archAr=document.getElementById("ov_arch_ar").value.trim();
  const learn=document.getElementById("ov_learn").value.trim();
  const msg=document.getElementById("ov_msg").value.trim();
  const data=JSON.stringify({archetype:arch||null,archetype_ar:archAr||null,learning_style:learn||null,message:msg||null});
  // Remove old override if exists
  const old=getOverride(pid);
  const ok=await post({action:"sendMessage",message:{id:old?old.id:gid(),date:new Date().toISOString(),from_name:"Admin Override",text:"OVERRIDE:"+pid+":"+data,type:"admin_override"}});
  if(ok){toast("Profile updated! \u2713");R()}
}

async function clearOverride(pid){
  if(!confirm("Clear all overrides for this player?"))return;
  const ok=await post({action:"sendMessage",message:{id:gid(),date:new Date().toISOString(),from_name:"Admin",text:"OVERRIDE:"+pid+":{}",type:"admin_override"}});
  if(ok){toast("Overrides cleared");R()}
}

function vAD(){
  const d=S.d;
  let h='<h2 class="tl">Data / \u0627\u0644\u0628\u064A\u0627\u0646\u0627\u062A</h2><div class="cd"><div class="cb"><div class="ib" style="margin-bottom:12px">\uD83D\uDC65 '+d.players.length+' \u00B7 \uD83D\uDCCB '+d.sessions.length+' \u00B7 \uD83D\uDCCA '+d.evaluations.length+' \u00B7 \uD83D\uDCE2 '+d.messages.length+'</div>';
  h+='<button class="bp bf" style="margin-bottom:8px" onclick="expD()">\uD83D\uDCE5 Export / \u062A\u0635\u062F\u064A\u0631</button>';
  h+='<button class="bf" style="background:none;border:1px solid var(--b);color:var(--b);border-radius:8px;padding:10px;font-size:14px" onclick="api().then(()=>{R();toast(\'Refreshed\')})">\uD83D\uDD04 Refresh / \u062A\u062D\u062F\u064A\u062B</button></div></div>';
  if(d.players.length){
    h+='<div class="cd"><div class="ch">PINs</div><div class="cb"><div style="font-size:12px;color:var(--t2);margin-bottom:8px">Coach PIN: <b style="font-family:monospace;font-size:14px">'+PIN_COACH+'</b> | Admin PIN: <b style="font-family:monospace;font-size:14px">'+PIN_ADMIN+'</b></div>';
    d.players.forEach(p=>{h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:14px"><span>'+p.name+'</span><span style="font-weight:700;font-family:monospace;font-size:16px">'+p.parent_pin+'</span></div>'});
    h+='</div></div>';
  }
  return h;
}

function expD(){
  const b=new Blob([JSON.stringify(S.d,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="host-academy-"+new Date().toISOString().slice(0,10)+".json";a.click();toast("Exported");
}

// ═══ INIT ═══
api().then(R);
</script>
</body>
</html>
